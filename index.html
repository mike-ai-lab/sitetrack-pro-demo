<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Street Tracker - Riyadh</title>
    
    <!-- Favicon (data URI to avoid 404 error) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺️</text></svg>">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script>
        // No API keys needed - using Google Maps tiles
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #map { 
            height: 100vh; 
            width: 100vw; 
            cursor: crosshair;
            touch-action: pan-x pan-y pinch-zoom;
        }
        
        /* Ensure map is clickable on mobile */
        .leaflet-container {
            touch-action: pan-x pan-y pinch-zoom !important;
        }
        
        .leaflet-tile-pane,
        .leaflet-overlay-pane {
            pointer-events: auto !important;
        }
        
        /* History Panel States */
        .history-collapsed {
            width: 56px !important;
            height: 56px !important;
            border-radius: 50% !important;
        }

        .history-expanded {
            width: 340px !important;
            height: auto !important;
            border-radius: 2.8rem !important;
        }
        
        .history-collapsed .content-visible {
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            pointer-events: none;
        }
        
        .history-collapsed #history-header {
            padding: 0 !important;
            justify-content: center !important;
            align-items: center !important;
            height: 56px !important;
        }
        
        .history-collapsed #history-header h2,
        .history-collapsed #history-header > div:last-child {
            display: none !important;
        }
        
        .history-collapsed #history-header::before {
            content: '';
            display: block;
            width: 24px;
            height: 24px;
            background-image: url("data:image/svg+xml,%3Csvg width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23000' stroke-width='2' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='12' cy='12' r='10'/%3E%3Cpolyline points='12 6 12 12 16 14'/%3E%3C/svg%3E");
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
        .car-icon-inner {
            transition: transform 0.6s ease-out;
            transform-origin: center center;
        }
        .car-marker-icon {
            z-index: 1000 !important;
            pointer-events: none;
        }
        .leaflet-marker-pane {
            z-index: 600 !important;
        }
        .leaflet-routing-container { display: none; }
        
        /* Hide devtools inspector highlight */
        .element-inspector-highlight { display: none !important; }
        path.leaflet-interactive.element-inspector-highlight { display: none !important; }
        
        /* Mobile optimizations */
        @media (max-width: 640px) {
            /* Car icon adjustments */
            .car-icon-inner {
                width: 50px !important;
                height: 50px !important;
            }
            .car-icon-inner svg {
                width: 50px !important;
                height: 50px !important;
            }
            
            /* Improve touch targets on mobile */
            #map {
                cursor: default !important;
            }
            
            /* Add visual feedback for touch */
            .leaflet-container {
                -webkit-tap-highlight-color: rgba(59, 130, 246, 0.2);
            }
            
            /* Main Panel - Top Left */
            #control-panel {
                top: 16px !important;
                left: 16px !important;
            }
            
            /* History Button - Top Right */
            .fixed.top-5.right-5:has(#history-btn) {
                top: 16px !important;
                right: 16px !important;
            }
            
            #history-btn {
                width: 48px !important;
                height: 48px !important;
            }
            
            /* History Panel - Top Right */
            #history-panel {
                top: 16px !important;
                right: 16px !important;
                max-width: calc(100vw - 32px) !important;
            }
            
            #history-panel > div {
                width: 280px !important;
                max-width: calc(100vw - 32px) !important;
            }
            
            /* Live Telemetry - Top Center */
            #analytics {
                top: 16px !important;
                left: 50% !important;
                transform: translateX(-50%) !important;
                max-width: calc(100vw - 32px) !important;
            }
            
            #analytics > div {
                height: 48px !important;
                padding: 0 10px !important;
                gap: 8px !important;
            }
            
            #analytics .text-\[9px\] {
                font-size: 8px !important;
            }
            
            #analytics .text-sm {
                font-size: 11px !important;
            }
            
            #analytics .text-\[7px\] {
                font-size: 6px !important;
            }
            
            /* History panel mobile */
            .history-expanded {
                width: calc(100vw - 32px) !important;
                max-width: 340px !important;
            }
            
            .history-collapsed {
                width: 48px !important;
                height: 48px !important;
            }
            
            /* Right Side Buttons - Bottom Right */
            .fixed.bottom-5.right-5 {
                bottom: 16px !important;
                right: 16px !important;
                gap: 10px !important;
            }
            
            #traffic-btn,
            #locate-btn {
                width: 48px !important;
                height: 48px !important;
            }
            
            /* Panel responsive */
            .panel-expanded {
                width: calc(100vw - 32px) !important;
                max-width: 340px !important;
            }
            
            .panel-collapsed {
                width: 48px !important;
                height: 48px !important;
            }
        }
    </style>
</head>
<body class="bg-gray-100 overflow-hidden">

    <!-- Panel will be injected by panel.js (it uses top-8 left-8 = 32px, we'll override it) -->

    <!-- Right Side Buttons Column (Bottom Right) -->
    <div class="fixed bottom-5 right-5 z-[1000] pointer-events-auto flex flex-col gap-3">
        <!-- Layer Switcher -->
        <div id="layer-switcher" class="relative">
            <!-- Main Layer Button -->
            <button id="layer-btn" onclick="toggleLayerMenu()" class="bg-white w-[56px] h-[56px] flex items-center justify-center rounded-full shadow-lg border border-gray-200 hover:bg-gray-50 transition-all" title="Map Layers">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="12 2 2 7 12 12 22 7 12 2"/>
                    <polyline points="2 17 12 22 22 17"/>
                    <polyline points="2 12 12 17 22 12"/>
                </svg>
            </button>
            
            <!-- Layer Options (Hidden by default) -->
            <div id="layer-menu" class="hidden absolute bottom-full right-0 mb-2 bg-white rounded-2xl shadow-xl border border-gray-200 overflow-hidden min-w-[140px]">
                <button onclick="switchMapLayer('default')" class="w-full px-4 py-3 text-left text-xs font-semibold text-gray-700 hover:bg-gray-50 transition-all flex items-center gap-2 border-b border-gray-100">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <line x1="9" y1="3" x2="9" y2="21"/>
                        <line x1="15" y1="3" x2="15" y2="21"/>
                    </svg>
                    Default
                </button>
                <button onclick="switchMapLayer('satellite')" class="w-full px-4 py-3 text-left text-xs font-semibold text-gray-700 hover:bg-gray-50 transition-all flex items-center gap-2">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                    </svg>
                    Satellite
                </button>
            </div>
        </div>
        
        <!-- Locate Me Button -->
        <button id="locate-btn" onclick="locateUser()" class="bg-white w-[56px] h-[56px] flex items-center justify-center rounded-full shadow-lg border border-gray-200 hover:bg-gray-50 transition-all" title="Find My Location">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
        </button>
        
        <!-- Traffic Toggle Button -->
        <button id="traffic-btn" onclick="toggleTraffic()" class="bg-white w-[56px] h-[56px] flex items-center justify-center rounded-full shadow-lg border border-gray-200 hover:bg-gray-50 transition-all" title="Toggle Traffic">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="6" r="2"/>
                <circle cx="12" cy="12" r="2"/>
                <circle cx="12" cy="18" r="2"/>
                <line x1="12" y1="1" x2="12" y2="23"/>
            </svg>
        </button>
    </div>

    <!-- History Toggle Button (Top Right) -->
    <div class="fixed top-5 right-5 z-[999] pointer-events-auto">
        <button id="history-btn" onclick="toggleHistory()" class="bg-white w-[56px] h-[56px] flex items-center justify-center rounded-full shadow-lg border border-gray-200 hover:bg-gray-50 transition-all" title="Trip History">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
            </svg>
        </button>
    </div>

    <!-- History Panel -->
    <div id="history-panel" class="fixed top-5 right-5 z-[1000] pointer-events-auto hidden">
        <div id="history-panel-inner" class="glass flex flex-col rounded-[2.8rem] shadow-[0_30px_90px_-10px_rgba(0,0,0,0.2)] w-[340px] overflow-hidden transition-all duration-700 ease-[cubic-bezier(0.16,1,0.3,1)] history-expanded">
            
            <!-- Header (Clickable) -->
            <div id="history-header" class="flex items-center justify-between px-8 py-6 cursor-pointer select-none active:scale-[0.98] transition-all" onclick="toggleHistory()">
                <h2 class="text-[14px] font-bold tracking-[0.2em] text-black uppercase" style="font-family: 'Playfair Display', serif;">
                    TRIP<span class="font-light opacity-30">HISTORY</span>
                </h2>
                <div class="flex items-center gap-2 bg-blue-500/10 px-3 py-1.5 rounded-full">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </svg>
                    <span class="text-[10px] font-black text-blue-700 uppercase tracking-widest">History</span>
                </div>
            </div>
            
            <!-- Content -->
            <div id="history-content" class="content-visible">
                <div class="px-8 pb-8">
                    <div id="history-list" class="space-y-2 max-h-[400px] overflow-y-auto pr-2">
                        <p class="text-[10px] text-gray-400 italic text-center py-8">No recent trips</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- History Toggle Button -->
    <!-- Analytics Window (Live Telemetry) -->
    <div id="analytics" class="fixed top-5 left-1/2 -translate-x-1/2 z-[500] pointer-events-none opacity-0 transition-opacity duration-500">
        <div class="bg-white backdrop-blur-md px-4 py-2 rounded-full shadow-lg h-[56px] border border-gray-200 pointer-events-auto flex items-center gap-3">
            <div class="flex items-center gap-1.5">
                <div class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></div>
                <span class="text-[9px] font-bold uppercase tracking-wider text-black">SESSION</span>
            </div>
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-1">
                    <p class="text-[7px] text-gray-500 uppercase">Dist</p>
                    <p id="stat-dist" class="text-sm font-mono font-bold whitespace-nowrap text-gray-900">0.0 km</p>
                </div>
                <div class="flex items-center gap-1">
                    <p class="text-[7px] text-gray-500 uppercase">Time</p>
                    <p id="stat-time" class="text-sm font-mono font-bold whitespace-nowrap text-gray-900">00:00</p>
                </div>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <script>
        let map, carMarker, routingControl, historyPoints = [];
        let waypoints = [];
        let currentHeading = 0;
        let isDriving = false;
        let isPaused = false;
        let routeCoords = [];
        let currentSegmentIndex = 0;
        let currentSpeed = 80;
        let shouldEndTrip = false;
        let editingPointIndex = null;
        let pickupMarker = null;
        let destMarker = null;
        // currentMode is now managed globally via window.currentMode
        // let currentMode = 'planner';

        // Live Recording Variables
        let isRecording = false;
        let recordingStartTime = null;
        let recordingDuration = 0;
        let recordedPath = [];
        let visitedSegments = new Map();
        let pathPolylines = [];
        let watchId = null;
        let totalDistance = 0;
        let streetsVisited = 0;
        let streetsRevisited = 0;
        let durationInterval = null;
        let recordingSessions = [];
        let userLocationMarker = null;
        let isLocationFound = false;
        let simulationMode = false;
        let recordingStartLocation = null;
        let recordingStopCount = 0;
        let recordingWaypoints = [];
        let recordingStations = []; // Detailed station tracking with time and location
        let recordingHistory = [];
        
        // Expose recordingHistory globally
        window.recordingHistory = recordingHistory;
        let simulatedElapsedTime = 0;
        let isSimulationAnimating = false;
        let trafficLayer = null;
        let trafficEnabled = false;

        // Panel API (will be initialized after map)
        let Panel = null;

        function initMap() {
            console.log('🗺️ INITIALIZING MAP...');
            map = L.map('map', { 
                zoomControl: false, 
                attributionControl: false,
                tap: true,
                tapTolerance: 20,
                touchZoom: true,
                dragging: true
            }).setView([24.7115, 46.6744], 15);
            
            console.log('✅ Map created at zoom level:', map.getZoom());
            
            // Google Maps tiles - no API key needed
            const initialLayer = L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
                maxZoom: 20,
                subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
                attribution: 'Google'
            });
            
            initialLayer.on('loading', () => console.log('📥 Initial tiles loading...'));
            initialLayer.on('load', () => console.log('✅ Initial tiles loaded successfully'));
            initialLayer.on('tileerror', (e) => console.error('❌ Initial tile error:', e));
            initialLayer.on('tileload', (e) => console.log('📦 Tile loaded:', e.coords));
            
            initialLayer.addTo(map);
            console.log('✅ Initial tile layer added to map');

            // Google Traffic Layer - using r,traffic with style=15
            // Note: This includes road outlines which may appear white, but it's the only way traffic works
            trafficLayer = L.tileLayer('https://{s}.google.com/vt/lyrs=r,traffic&x={x}&y={y}&z={z}&style=15', {
                maxZoom: 20,
                subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
                opacity: 1.0,
                zIndex: 1000
            });

            const carHtml = `
                <div class="car-icon-inner" id="car-inner" style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;">
                    <svg width="40" height="40" viewBox="0 0 100 100" style="display: block;">
                        <rect x="25" y="10" width="50" height="80" rx="15" fill="#1a1a1a" />
                        <rect x="30" y="22" width="40" height="18" rx="4" fill="#444" />
                        <rect x="30" y="12" width="8" height="4" rx="1" fill="#FFFACD" />
                        <rect x="62" y="12" width="8" height="4" rx="1" fill="#FFFACD" />
                    </svg>
                </div>
            `;

            const icon = L.divIcon({ 
                html: carHtml, 
                className: 'car-marker-icon', 
                iconSize: [40, 40], 
                iconAnchor: [20, 20] 
            });
            carMarker = L.marker([24.7115, 46.6744], { 
                icon: icon, 
                opacity: 0,
                zIndexOffset: 1000
            }).addTo(map);

            map.on('click', onMapClick);
            
            // Location event handlers
            map.on('locationfound', (e) => {
                const btn = document.getElementById('locate-btn');
                btn.classList.remove('opacity-50');
                
                const radius = e.accuracy / 2;
                L.circle(e.latlng, radius).addTo(map);
                
                if (userLocationMarker) {
                    map.removeLayer(userLocationMarker);
                }
                
                const locationIcon = L.divIcon({
                    html: '<div style="width: 16px; height: 16px; background: #3b82f6; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);"></div>',
                    className: '',
                    iconSize: [16, 16],
                    iconAnchor: [8, 8]
                });
                
                userLocationMarker = L.marker(e.latlng, { icon: locationIcon }).addTo(map);
                carMarker.setLatLng(e.latlng);
                carMarker.setOpacity(1);
                
                isLocationFound = true;
                
                if (window.currentMode === 'recorder') {
                    document.getElementById('start-recording-btn').disabled = false;
                    document.getElementById('record-badge').innerText = 'Ready';
                    document.getElementById('record-badge').classList.remove('bg-gray-100', 'text-gray-700');
                    document.getElementById('record-badge').classList.add('bg-green-100', 'text-green-700');
                }
            });

            map.on('locationerror', (e) => {
                const btn = document.getElementById('locate-btn');
                btn.classList.remove('opacity-50');
                console.warn("Location access denied or unavailable:", e.message);
                alert('Unable to get location: ' + e.message);
            });
        }

        function toggleTraffic() {
            trafficEnabled = !trafficEnabled;
            const btn = document.getElementById('traffic-btn');
            
            if (trafficEnabled) {
                trafficLayer.addTo(map);
                btn.classList.add('bg-red-50', 'border-red-300');
                btn.querySelector('svg').style.stroke = '#ef4444';
            } else {
                map.removeLayer(trafficLayer);
                btn.classList.remove('bg-red-50', 'border-red-300');
                btn.querySelector('svg').style.stroke = 'currentColor';
            }
        }

        // Layer Switcher - Google Maps tiles
        let currentMapLayer = 'default';
        let baseLayer = null;
        
        function toggleLayerMenu() {
            const menu = document.getElementById('layer-menu');
            menu.classList.toggle('hidden');
        }
        
        function switchMapLayer(layerType) {
            console.log('🗺️ SWITCHING MAP LAYER TO:', layerType);
            currentMapLayer = layerType;
            
            // Remove existing layer
            if (baseLayer) {
                console.log('🗑️ Removing old base layer');
                map.removeLayer(baseLayer);
            }
            
            // Add new Google Maps layer
            if (layerType === 'satellite') {
                console.log('🛰️ Adding Google Hybrid (satellite + labels)...');
                // Google Hybrid: satellite imagery WITH labels
                baseLayer = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
                    maxZoom: 20,
                    subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
                    attribution: 'Google'
                }).addTo(map);
                console.log('✅ Google Hybrid added');
            } else {
                console.log('🗺️ Adding Google Roadmap...');
                // Google Roadmap: standard map with labels
                baseLayer = L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
                    maxZoom: 20,
                    subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
                    attribution: 'Google'
                }).addTo(map);
                console.log('✅ Google Roadmap added');
            }
            
            // Close menu
            document.getElementById('layer-menu').classList.add('hidden');
            
            // Update global for preview maps
            window.currentMapLayer = currentMapLayer;
            
            console.log('🎯 Current zoom level:', map.getZoom());
            console.log('🎯 Current center:', map.getCenter());
        }
        
        // Close layer menu when clicking outside
        document.addEventListener('click', function(e) {
            const layerSwitcher = document.getElementById('layer-switcher');
            const layerMenu = document.getElementById('layer-menu');
            
            if (layerSwitcher && !layerSwitcher.contains(e.target)) {
                layerMenu.classList.add('hidden');
            }
        });
        
        // Initialize with Google Roadmap
        window.addEventListener('DOMContentLoaded', function() {
            baseLayer = L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
                maxZoom: 20,
                subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
                attribution: 'Google'
            });
            window.currentMapLayer = 'default';
        });

        function onMapClick(e) {
            console.log('🗺️ MAP CLICKED at:', e.latlng);
            console.log('currentMode:', window.currentMode);
            console.log('simulationMode:', simulationMode);
            console.log('isRecording:', isRecording);
            
            // HISTORY TAB AUTO-RECORDING: If History tab is active, auto-switch to recorder mode
            if (window.currentMode === 'history') {
                console.log('📜 History tab active - auto-switching to recorder mode');
                
                // Switch to recorder tab
                if (window.Panel && window.Panel.switchTab) {
                    window.Panel.switchTab('recorder');
                }
                
                // Enable simulation mode
                simulationMode = true;
                window.simulationMode = true;
                
                // Start recording if not already recording
                if (!isRecording) {
                    console.log('🔴 Auto-starting recording from history tab');
                    startRecording();
                }
                
                // Now simulate movement with the clicked point
                // Add as a station with detailed tracking
                const stationNumber = recordingStations.length + 1;
                const arrivalTime = new Date();
                
                const station = {
                    number: stationNumber,
                    location: e.latlng,
                    arrivalTime: arrivalTime,
                    departureTime: null, // Will be set when moving to next station
                    duration: null,
                    address: 'Loading...',
                    contact: null // Placeholder for contact details
                };
                
                recordingStations.push(station);
                recordingWaypoints.push(e.latlng);
                
                // Get address for this station
                getAddressFromCoords(e.latlng.lat, e.latlng.lng).then(addr => {
                    station.address = addr;
                }).catch(() => {
                    station.address = `${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}`;
                });
                
                // Set departure time for previous station
                if (recordingStations.length > 1) {
                    const prevStation = recordingStations[recordingStations.length - 2];
                    prevStation.departureTime = arrivalTime;
                    prevStation.duration = Math.floor((arrivalTime - prevStation.arrivalTime) / 1000); // seconds
                }
                
                simulateMovement(e.latlng);
                return;
            }
            
            // Simulation mode for recording (AUTO-ENABLED)
            if (window.currentMode === 'recorder' && simulationMode && isRecording) {
                console.log('✅ Calling simulateMovement...');
                
                // Add as a station with detailed tracking
                const stationNumber = recordingStations.length + 1;
                const arrivalTime = new Date();
                
                const station = {
                    number: stationNumber,
                    location: e.latlng,
                    arrivalTime: arrivalTime,
                    departureTime: null,
                    duration: null,
                    address: 'Loading...',
                    contact: null
                };
                
                recordingStations.push(station);
                recordingWaypoints.push(e.latlng);
                
                // Get address
                getAddressFromCoords(e.latlng.lat, e.latlng.lng).then(addr => {
                    station.address = addr;
                }).catch(() => {
                    station.address = `${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}`;
                });
                
                // Set departure time for previous station
                if (recordingStations.length > 1) {
                    const prevStation = recordingStations[recordingStations.length - 2];
                    prevStation.departureTime = arrivalTime;
                    prevStation.duration = Math.floor((arrivalTime - prevStation.arrivalTime) / 1000);
                }
                
                simulateMovement(e.latlng);
                return;
            }
            
            console.log('❌ Not in recording simulation mode');
            
            if (isDriving || window.currentMode === 'recorder') return;
            
            // If editing a point, update it
            if (editingPointIndex !== null) {
                updatePoint(editingPointIndex, e.latlng);
                return;
            }
            
            // Normal point setting flow
            if (waypoints.length >= 2) resetPointsOnly();

            waypoints.push(e.latlng);
            const markerColor = waypoints.length === 1 ? '#3b82f6' : '#ef4444';
            const marker = L.circleMarker(e.latlng, { 
                color: markerColor, 
                fillColor: markerColor, 
                fillOpacity: 0.5, 
                radius: 6 
            }).addTo(map);
            
            if (waypoints.length === 1) {
                pickupMarker = marker;
                document.getElementById('pickup-label').innerText = "Pickup point set";
                document.getElementById('trip-badge').innerText = "Set Destination";
            } else {
                destMarker = marker;
                document.getElementById('dest-label').innerText = "Destination point set";
                document.getElementById('trip-badge').innerText = "Ready";
                document.getElementById('start-btn').disabled = false;
                calculateRoute();
            }
        }

        function startEditingPoint(index) {
            if (isDriving) return;
            if (waypoints.length <= index) return;
            
            editingPointIndex = index;
            const boxId = index === 0 ? 'pickup-box' : 'dest-box';
            const labelId = index === 0 ? 'pickup-label' : 'dest-label';
            
            document.getElementById(boxId).classList.add('ring-2', 'ring-offset-2');

        }

        function updatePoint(index, newLatLng) {
            waypoints[index] = newLatLng;
            
            // Remove old marker and create new one
            if (index === 0 && pickupMarker) {
                map.removeLayer(pickupMarker);
                pickupMarker = L.circleMarker(newLatLng, { 
                    color: '#3b82f6', 
                    fillColor: '#3b82f6', 
                    fillOpacity: 0.5, 
                    radius: 6 
                }).addTo(map);
            } else if (index === 1 && destMarker) {
                map.removeLayer(destMarker);
                destMarker = L.circleMarker(newLatLng, { 
                    color: '#ef4444', 
                    fillColor: '#ef4444', 
                    fillOpacity: 0.5, 
                    radius: 6 
                }).addTo(map);
            }
            
            // Update UI
            const boxId = index === 0 ? 'pickup-box' : 'dest-box';
            const labelId = index === 0 ? 'pickup-label' : 'dest-label';
            
            document.getElementById(boxId).classList.remove('ring-2', 'ring-offset-2', 'ring-blue-500', 'ring-red-500');
            document.getElementById(labelId).innerText = index === 0 ? "Pickup point updated" : "Destination point updated";
            document.getElementById('trip-badge').innerText = "Ready";
            
            editingPointIndex = null;
            
            // Recalculate route
            if (waypoints.length === 2) {
                calculateRoute();
            }
        }

        function calculateRoute(silent = false) {
            if (routingControl) map.removeControl(routingControl);
            routingControl = L.Routing.control({
                waypoints: waypoints,
                router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' }),
                lineOptions: { styles: [{ color: '#3b82f6', opacity: 0.3, weight: 6 }] },
                addWaypoints: false, draggableWaypoints: false
            }).addTo(map);

            routingControl.on('routesfound', function(e) {
                routeCoords = e.routes[0].coordinates;
                document.getElementById('stat-dist').innerText = `${(e.routes[0].summary.totalDistance / 1000).toFixed(2)} km`;
                if (!silent) saveToHistory(waypoints[0], waypoints[1]);
            });
        }

        async function getAddressFromCoords(lat, lng) {
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`);
                const data = await response.json();
                
                // Extract meaningful address parts
                const addr = data.address;
                const road = addr.road || addr.street || '';
                const neighborhood = addr.neighbourhood || addr.suburb || addr.district || '';
                
                if (road && neighborhood) {
                    return `${road}, ${neighborhood}`;
                } else if (road) {
                    return road;
                } else if (neighborhood) {
                    return neighborhood;
                } else {
                    return data.display_name.split(',').slice(0, 2).join(',');
                }
            } catch (error) {
                throw error;
            }
        }

        let tripStartTime = null;

        async function startTrip() {
            shouldEndTrip = false;
            currentSegmentIndex = 0;
            currentSpeed = parseInt(document.getElementById('speed-slider').value);
            
            // Start trip timer
            tripStartTime = Date.now();
            if (tripTimerInterval) clearInterval(tripTimerInterval);
            tripTimerInterval = setInterval(updateTripTime, 1000);
            
            document.getElementById('start-btn').classList.add('hidden');
            document.getElementById('pause-btn').classList.remove('hidden');
            document.getElementById('pause-btn').disabled = false;
            document.getElementById('end-btn').classList.remove('hidden');
            document.getElementById('analytics').style.opacity = "1";
            
            carMarker.setLatLng(routeCoords[0]);
            carMarker.setOpacity(1);

            for (let i = 0; i < routeCoords.length - 1; i++) {
                if (shouldEndTrip) break;
                
                while (isPaused && !shouldEndTrip) await new Promise(r => setTimeout(r, 100));
                if (shouldEndTrip) break;
                
                const start = routeCoords[i];
                const end = routeCoords[i + 1];
                const distance = L.latLng(start.lat, start.lng).distanceTo(L.latLng(end.lat, end.lng));
                if (distance < 0.1) continue;

                const heading = getHeading(start, end);
                document.getElementById('car-inner').style.transform = `rotate(${heading}deg)`;

                const duration = Math.max((distance * 1000) / currentSpeed, 10);
                
                if (document.getElementById('follow-toggle').checked) {
                    map.panTo(carMarker.getLatLng(), { animate: true, duration: duration/1000 });
                }

                await moveSegment(start, end, duration);
            }

            if (!shouldEndTrip) {
                isDriving = false;
                document.getElementById('start-btn').classList.remove('hidden');
                document.getElementById('pause-btn').classList.add('hidden');
                document.getElementById('end-btn').classList.add('hidden');
                document.getElementById('trip-badge').innerText = "Done";
            }
        }

        function moveSegment(start, end, duration) {
            return new Promise(resolve => {
                const startTime = performance.now();
                let lastProgress = 0;
                
                function step(now) {
                    if (shouldEndTrip) { resolve(); return; }
                    if (isPaused) { requestAnimationFrame(step); return; }
                    
                    const elapsed = now - startTime;
                    // Recalculate duration based on current speed for smooth transitions
                    const distance = L.latLng(start.lat, start.lng).distanceTo(L.latLng(end.lat, end.lng));
                    const newDuration = Math.max((distance * 1000) / currentSpeed, 10);
                    
                    // Adjust progress based on speed changes
                    const progress = Math.min(elapsed / newDuration, 1);
                    
                    carMarker.setLatLng([
                        start.lat + (end.lat - start.lat) * progress, 
                        start.lng + (end.lng - start.lng) * progress
                    ]);
                    
                    if (progress < 1) requestAnimationFrame(step); 
                    else resolve();
                }
                requestAnimationFrame(step);
            });
        }

        function getHeading(p1, p2) {
            const lat1 = p1.lat * Math.PI / 180, lat2 = p2.lat * Math.PI / 180;
            const dLon = (p2.lng - p1.lng) * Math.PI / 180;
            const y = Math.sin(dLon) * Math.cos(lat2);
            const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
            let target = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
            if (Math.abs(target - currentHeading) > 180) currentHeading += (target > currentHeading ? -360 : 360);
            return currentHeading = target;
        }

        // ============================================
        // SIMULATION MODE FUNCTIONS (AUTO-ENABLED)
        // ============================================

        // Queue system for multiple waypoints
        let waypointQueue = [];
        let queueMarkers = [];
        let plannedRoutePolylines = [];
        let isProcessingQueue = false;
        let currentRouteAnimation = null; // Track current animation

        function simulateMovement(latlng) {
            if (!isRecording) return;
            
            // If this is the first point, set starting position
            if (recordedPath.length === 0) {
                const position = {
                    coords: {
                        latitude: latlng.lat,
                        longitude: latlng.lng
                    }
                };
                onPositionUpdate(position);
                return;
            }
            
            // Add point to queue
            addWaypointToQueue(latlng);
            
            // Start processing queue if not already processing
            if (!isProcessingQueue) {
                processWaypointQueue();
            }
        }

        function addWaypointToQueue(latlng) {
            // Add to queue
            waypointQueue.push(latlng);
            
            // Add blue marker for queued waypoint
            const marker = L.circleMarker(latlng, {
                radius: 6,
                fillColor: '#3b82f6',
                color: '#fff',
                weight: 2,
                opacity: 1,
                fillOpacity: 0.8
            }).addTo(map);
            
            queueMarkers.push(marker);
            
            // Calculate and show planned route (dashed orange)
            const fromPoint = waypointQueue.length === 1 
                ? recordedPath[recordedPath.length - 1] 
                : waypointQueue[waypointQueue.length - 2];
            
            if (fromPoint) {
                showPlannedRoute(fromPoint, latlng);
            }
        }

        function showPlannedRoute(from, to) {
            // Use routing to get street path
            const tempRouting = L.Routing.control({
                waypoints: [
                    L.latLng(from.lat, from.lng),
                    L.latLng(to.lat, to.lng)
                ],
                router: L.Routing.osrmv1({ 
                    serviceUrl: 'https://router.project-osrm.org/route/v1',
                    timeout: 10000
                }),
                show: false,
                addWaypoints: false,
                routeWhileDragging: false,
                fitSelectedRoutes: false, // DON'T auto-fit the route bounds!
                createMarker: function() { return null; },
                lineOptions: { 
                    styles: [{ color: 'transparent', opacity: 0, weight: 0 }],
                    addWaypoints: false
                }
            });

            tempRouting.on('routesfound', function(e) {
                const route = e.routes[0];
                const routeCoords = route.coordinates;
                
                // Draw dashed orange line for planned route
                const plannedPolyline = L.polyline(routeCoords, {
                    color: '#fb923c',
                    weight: 4,
                    opacity: 0.7,
                    dashArray: '10, 10',
                    lineCap: 'round'
                }).addTo(map);
                
                plannedRoutePolylines.push(plannedPolyline);
                
                // Remove temp routing control
                setTimeout(() => {
                    try {
                        map.removeControl(tempRouting);
                    } catch(err) {}
                }, 100);
            });

            tempRouting.on('routingerror', function(e) {
                // Fallback to straight dashed line
                const plannedPolyline = L.polyline([from, to], {
                    color: '#fb923c',
                    weight: 4,
                    opacity: 0.7,
                    dashArray: '10, 10',
                    lineCap: 'round'
                }).addTo(map);
                
                plannedRoutePolylines.push(plannedPolyline);
                
                setTimeout(() => {
                    try {
                        map.removeControl(tempRouting);
                    } catch(err) {}
                }, 100);
            });

            tempRouting.addTo(map);
        }

        async function processWaypointQueue() {
            if (isProcessingQueue || waypointQueue.length === 0) return;
            
            isProcessingQueue = true;
            
            while (waypointQueue.length > 0 && isRecording) {
                const nextWaypoint = waypointQueue[0];
                const currentPos = recordedPath[recordedPath.length - 1];
                
                try {
                    await calculateSimulationRoute(currentPos, nextWaypoint);
                    
                    waypointQueue.shift();
                    
                    if (queueMarkers.length > 0) {
                        map.removeLayer(queueMarkers.shift());
                    }
                    
                    if (plannedRoutePolylines.length > 0) {
                        map.removeLayer(plannedRoutePolylines.shift());
                    }
                } catch (error) {
                    // Skip failed waypoint
                    waypointQueue.shift();
                    if (queueMarkers.length > 0) {
                        map.removeLayer(queueMarkers.shift());
                    }
                    if (plannedRoutePolylines.length > 0) {
                        map.removeLayer(plannedRoutePolylines.shift());
                    }
                }
            }
            
            isProcessingQueue = false;
        }

        function clearWaypointQueue() {
            if (currentRouteAnimation) {
                currentRouteAnimation.cancelled = true;
                currentRouteAnimation = null;
            }
            
            waypointQueue = [];
            isProcessingQueue = false;
            
            queueMarkers.forEach(marker => {
                try { map.removeLayer(marker); } catch(e) {}
            });
            queueMarkers = [];
            
            plannedRoutePolylines.forEach(polyline => {
                try { map.removeLayer(polyline); } catch(e) {}
            });
            plannedRoutePolylines = [];
        }

        function calculateSimulationRoute(from, to) {
            return new Promise((resolve) => {
                const animationTracker = { cancelled: false };
                currentRouteAnimation = animationTracker;
                
                const tempRouting = L.Routing.control({
                    waypoints: [
                        L.latLng(from.lat, from.lng),
                        L.latLng(to.lat, to.lng)
                    ],
                    router: L.Routing.osrmv1({ 
                        serviceUrl: 'https://router.project-osrm.org/route/v1',
                        timeout: 10000
                    }),
                    show: false,
                    addWaypoints: false,
                    routeWhileDragging: false,
                    fitSelectedRoutes: false, // DON'T auto-fit the route bounds!
                    createMarker: function() { return null; },
                    lineOptions: { 
                        styles: [{ color: 'transparent', opacity: 0, weight: 0 }],
                        addWaypoints: false
                    }
                });

                let routingResolved = false;

                tempRouting.on('routesfound', function(e) {
                    if (routingResolved) return;
                    routingResolved = true;
                    
                    const route = e.routes[0];
                    const routeCoords = route.coordinates;
                    
                    animateSimulationRoute(routeCoords, animationTracker)
                        .then(() => resolve())
                        .catch(() => resolve());
                    
                    setTimeout(() => {
                        try { map.removeControl(tempRouting); } catch(e) {}
                    }, 100);
                });

                tempRouting.on('routingerror', function() {
                    if (routingResolved) return;
                    routingResolved = true;
                    
                    // Fallback: direct movement
                    onPositionUpdate({
                        coords: { latitude: to.lat, longitude: to.lng }
                    });
                    
                    setTimeout(() => {
                        try { map.removeControl(tempRouting); } catch(e) {}
                    }, 100);
                    
                    resolve();
                });

                // Timeout fallback
                setTimeout(() => {
                    if (!routingResolved) {
                        routingResolved = true;
                        onPositionUpdate({
                            coords: { latitude: to.lat, longitude: to.lng }
                        });
                        try { map.removeControl(tempRouting); } catch(e) {}
                        resolve();
                    }
                }, 12000);

                try {
                    tempRouting.addTo(map);
                } catch(e) {
                    resolve();
                }
            });
        }

        async function animateSimulationRoute(routeCoords, animationTracker) {
            const speed = 100; // Increased to 100 points per second (even faster, smoother)
            const interval = 1000 / speed;

            for (let i = 0; i < routeCoords.length; i++) {
                if (animationTracker && animationTracker.cancelled) break;
                if (!isRecording) break;
                
                const point = routeCoords[i];
                if (!point || !point.lat || !point.lng) continue;
                
                try {
                    onPositionUpdate({
                        coords: {
                            latitude: point.lat,
                            longitude: point.lng
                        }
                    });
                } catch(err) {}
                
                await new Promise(resolve => setTimeout(resolve, interval));
            }
        }

        function locateUser() {
            const btn = document.getElementById('locate-btn');
            
            if (!navigator.geolocation) {
                alert('Geolocation is not supported by your browser');
                return;
            }
            
            // Visual feedback
            btn.classList.add('opacity-50');
            
            // Use optimized location options
            map.locate({
                setView: true, 
                maxZoom: 16,
                enableHighAccuracy: false,  // Faster, uses network/WiFi
                timeout: 10000,             // 10 seconds for first request
                maximumAge: 30000           // Use cached location up to 30 seconds old
            });
        }

        function locateMe() {
            if (!navigator.geolocation) {
                alert('Geolocation is not supported by your browser');
                return;
            }

            // Show loading state
            const btn = document.getElementById('locate-me-btn');
            btn.disabled = true;
            btn.innerHTML = `
                <svg class="animate-spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10" stroke-opacity="0.25"/>
                    <path d="M12 2a10 10 0 0 1 10 10" stroke-opacity="0.75"/>
                </svg>
                Locating...
            `;

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const userLocation = L.latLng(lat, lng);

                    // Center map on user location
                    map.setView(userLocation, 17);

                    // Show user location marker
                    if (userLocationMarker) {
                        map.removeLayer(userLocationMarker);
                    }

                    const locationIcon = L.divIcon({
                        html: `
                            <div style="position: relative;">
                                <div style="width: 20px; height: 20px; background: #3b82f6; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);"></div>
                                <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; background: rgba(59, 130, 246, 0.2); border-radius: 50%; animation: pulse 2s infinite;"></div>
                            </div>
                        `,
                        className: '',
                        iconSize: [40, 40],
                        iconAnchor: [20, 20]
                    });

                    userLocationMarker = L.marker(userLocation, { icon: locationIcon }).addTo(map);
                    
                    // Position car marker at user location
                    carMarker.setLatLng(userLocation);
                    carMarker.setOpacity(1);

                    isLocationFound = true;

                    // Update button
                    btn.disabled = false;
                    btn.classList.remove('bg-blue-500', 'hover:bg-blue-600');
                    btn.classList.add('bg-green-500', 'hover:bg-green-600');
                    btn.innerHTML = `
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 6L9 17l-5-5"/>
                        </svg>
                        Location Found
                    `;

                    // Enable start recording button
                    document.getElementById('start-recording-btn').disabled = false;
                    document.getElementById('record-badge').innerText = 'Ready to Start';
                    document.getElementById('record-badge').classList.remove('bg-gray-100', 'text-gray-700');
                    document.getElementById('record-badge').classList.add('bg-green-100', 'text-green-700');

                    console.log('Location found:', lat, lng);
                },
                (error) => {
                    console.error('Geolocation error:', error);
                    let message = 'Unable to get your location. ';
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            message += 'Please allow location access in your browser settings.';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            message += 'Location information is unavailable. Make sure GPS is enabled.';
                            break;
                        case error.TIMEOUT:
                            message += 'Location request timed out. Please try again.';
                            break;
                    }
                    alert(message);

                    // Reset button
                    btn.disabled = false;
                    btn.innerHTML = `
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        Locate Me
                    `;
                },
                {
                    enableHighAccuracy: false,
                    timeout: 15000,
                    maximumAge: 300000
                }
            );
        }

        function startRecording() {
            console.log('🔴 START RECORDING CALLED');
            console.log('simulationMode:', simulationMode);
            console.log('isLocationFound:', isLocationFound);
            console.log('navigator.geolocation:', navigator.geolocation);
            
            // In simulation mode, we don't need geolocation or location to be found
            // Just start recording immediately!
            if (!simulationMode) {
                if (!navigator.geolocation) {
                    alert('Geolocation is not supported by your browser.');
                    return;
                }
                if (!isLocationFound) {
                    alert('Please locate yourself first by clicking the locate button');
                    return;
                }
            }

            console.log('✅ Checks passed, starting recording...');

            isRecording = true;
            recordingStartTime = Date.now();
            simulatedElapsedTime = 0;
            recordedPath = [];
            totalDistance = 0;
            streetsVisited = 0;
            streetsRevisited = 0;
            recordingStopCount = 0;
            recordingWaypoints = [];
            recordingStations = [];
            recordingStartLocation = carMarker ? carMarker.getLatLng() : null;

            console.log('✅ Recording state set, updating UI...');

            // Update UI
            document.getElementById('start-recording-btn').classList.add('hidden');
            document.getElementById('stop-recording-btn').classList.remove('hidden');
            document.getElementById('stop-recording-btn').disabled = false;
            document.getElementById('recording-indicator').classList.remove('hidden');
            document.getElementById('record-badge').innerText = simulationMode ? 'Simulating' : 'Recording';
            document.getElementById('record-badge').classList.remove('bg-black/[0.03]', 'text-black/60', 'border-black/[0.05]');
            document.getElementById('record-badge').classList.add('bg-black/[0.08]', 'text-black', 'border-black/10');

            // Start duration counter
            durationInterval = setInterval(updateDuration, 1000);

            // Show history recording controls if on history tab
            if (Panel && Panel.showHistoryRecordingControls) {
                Panel.showHistoryRecordingControls();
            }

            // Only start GPS watch if not in simulation mode
            if (!simulationMode) {
                watchId = navigator.geolocation.watchPosition(
                    onPositionUpdate,
                    onPositionError,
                    { 
                        enableHighAccuracy: false, 
                        maximumAge: 5000,
                        timeout: 15000
                    }
                );
            }

            console.log('✅ Recording started', simulationMode ? '(Simulation Mode - Click map to move car)' : '(GPS Mode)');
            console.log('🟢 Now click on the map to simulate car movement!');
        }

        function stopRecording() {
            if (!isRecording) return;

            isRecording = false;
            clearWaypointQueue();

            // Hide history recording controls
            if (Panel && Panel.hideHistoryRecordingControls) {
                Panel.hideHistoryRecordingControls();
            }

            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }

            if (durationInterval) {
                clearInterval(durationInterval);
                durationInterval = null;
            }

            const simToggle = document.getElementById('sim-mode-toggle');
            if (simToggle) simToggle.disabled = false;

            // Save recording session to history
            saveRecordingToHistory();

            // Update UI
            document.getElementById('start-recording-btn').classList.remove('hidden');
            document.getElementById('stop-recording-btn').classList.add('hidden');
            document.getElementById('recording-indicator').classList.add('hidden');
            document.getElementById('record-badge').innerText = 'Stopped';
            document.getElementById('record-badge').classList.remove('bg-black/[0.08]', 'text-black', 'border-black/10');
            document.getElementById('record-badge').classList.add('bg-black/[0.03]', 'text-black/60', 'border-black/[0.05]');
            document.getElementById('save-session-btn').classList.remove('hidden');
            document.getElementById('save-session-btn').disabled = false;
        }

        async function saveRecordingToHistory() {
            console.log('💾 SAVE RECORDING TO HISTORY CALLED');
            console.log('recordedPath.length:', recordedPath.length);
            console.log('recordingStartLocation:', recordingStartLocation);
            
            if (recordedPath.length === 0) {
                console.log('❌ No recorded path, skipping save');
                return;
            }

            const endLocation = recordedPath[recordedPath.length - 1];
            const duration = simulationMode ? simulatedElapsedTime : Math.floor((Date.now() - recordingStartTime) / 1000);
            
            // Set departure time for last station
            if (recordingStations.length > 0) {
                const lastStation = recordingStations[recordingStations.length - 1];
                if (!lastStation.departureTime) {
                    lastStation.departureTime = new Date();
                    lastStation.duration = Math.floor((lastStation.departureTime - lastStation.arrivalTime) / 1000);
                }
            }
            
            const session = {
                id: Date.now(),
                type: 'recording',
                startLocation: recordingStartLocation,
                endLocation: endLocation,
                distance: totalDistance,
                duration: duration,
                stopCount: recordingStopCount,
                waypoints: [...recordingWaypoints],
                stations: [...recordingStations], // Detailed station data
                path: [...recordedPath],
                timestamp: new Date().toISOString(),
                startAddress: 'Loading...',
                endAddress: 'Loading...'
            };

            console.log('📦 Session created:', session);

            recordingHistory.unshift(session);
            window.recordingHistory = recordingHistory; // Update global reference
            
            if (recordingHistory.length > 10) recordingHistory.pop();

            console.log('✅ Recording history updated, total sessions:', recordingHistory.length);
            console.log('window.recordingHistory:', window.recordingHistory);

            // Get addresses asynchronously
            try {
                const [startAddr, endAddr] = await Promise.all([
                    getAddressFromCoords(recordingStartLocation.lat, recordingStartLocation.lng),
                    getAddressFromCoords(endLocation.lat, endLocation.lng)
                ]);
                session.startAddress = startAddr;
                session.endAddress = endAddr;
                console.log('✅ Addresses loaded:', startAddr, '→', endAddr);
            } catch (error) {
                console.log('⚠️ Address loading failed, using coordinates');
                session.startAddress = `${recordingStartLocation.lat.toFixed(4)}, ${recordingStartLocation.lng.toFixed(4)}`;
                session.endAddress = `${endLocation.lat.toFixed(4)}, ${endLocation.lng.toFixed(4)}`;
            }

            // Update history panel if it's open
            if (window.renderHistoryPanel) {
                console.log('🔄 Calling renderHistoryPanel...');
                window.renderHistoryPanel();
            } else {
                console.log('⚠️ renderHistoryPanel not available');
            }
        }

        let lastAutoFocusState = null;

        function onPositionUpdate(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const newPoint = L.latLng(lat, lng);

            carMarker.setLatLng(newPoint);
            carMarker.setOpacity(1);

            const autoFocusToggle = document.getElementById('auto-focus-toggle');
            const shouldAutoFocus = autoFocusToggle && autoFocusToggle.checked;

            if (recordedPath.length > 0) {
                const prevPoint = recordedPath[recordedPath.length - 1];
                const distance = prevPoint.distanceTo(newPoint);

                if (distance > 3) {
                    drawPathSegment(prevPoint, newPoint);
                    totalDistance += distance / 1000;
                    
                    if (simulationMode) {
                        const timeInHours = (distance / 1000) / 45;
                        const timeInSeconds = timeInHours * 3600;
                        simulatedElapsedTime += timeInSeconds;
                    }
                    
                    updateRecordingStats();
                    
                    const heading = getHeading(
                        { lat: prevPoint.lat, lng: prevPoint.lng },
                        { lat: newPoint.lat, lng: newPoint.lng }
                    );
                    document.getElementById('car-inner').style.transform = `rotate(${heading}deg)`;
                    
                    recordedPath.push(newPoint);
                    
                    if (shouldAutoFocus) {
                        map.panTo(newPoint, { animate: true, duration: 0.3 });
                    }
                }
            } else {
                if (shouldAutoFocus) {
                    map.setView(newPoint, 16);
                }
                recordedPath.push(newPoint);
            }
        }

        function onPositionError(error) {
            console.error('Geolocation error:', error);
            
            // Don't stop recording on every error, just log it
            if (error.code === error.TIMEOUT) {
                console.warn('Position timeout, waiting for next update...');
                return; // Continue recording, just skip this update
            }
            
            let message = 'Location tracking error: ';
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    message += 'Location access denied. Recording stopped.';
                    stopRecording();
                    break;
                case error.POSITION_UNAVAILABLE:
                    message += 'Location unavailable. Make sure GPS is enabled.';
                    break;
            }
            
            if (error.code !== error.TIMEOUT) {
                alert(message);
            }
        }

        function drawPathSegment(start, end) {
            // Create a unique key for this segment (rounded to ~50m precision for street-level)
            const segmentKey = `${start.lat.toFixed(3)},${start.lng.toFixed(3)}-${end.lat.toFixed(3)},${end.lng.toFixed(3)}`;
            
            let color, weight, isRevisit;
            
            if (visitedSegments.has(segmentKey)) {
                // Already visited - orange color
                color = '#f97316';
                weight = 6;
                isRevisit = true;
                streetsRevisited++;
            } else {
                // First visit - blue color
                color = '#3b82f6';
                weight = 6;
                isRevisit = false;
                visitedSegments.set(segmentKey, true);
                streetsVisited++;
            }

            // Draw the polyline
            const polyline = L.polyline([start, end], {
                color: color,
                weight: weight,
                opacity: 0.7,
                lineCap: 'round',
                lineJoin: 'round'
            }).addTo(map);

            pathPolylines.push(polyline);
        }

        function updateDuration() {
            if (!isRecording || !recordingStartTime) return;
            
            let elapsed;
            if (simulationMode) {
                // Use simulated time based on distance and speed
                elapsed = Math.floor(simulatedElapsedTime);
            } else {
                // Use real time
                elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
            }
            
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            document.getElementById('rec-duration').innerText = 
                `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function updateRecordingStats() {
            document.getElementById('rec-distance').innerText = `${totalDistance.toFixed(2)} km`;
            document.getElementById('rec-streets').innerText = streetsVisited;
            document.getElementById('rec-revisited').innerText = streetsRevisited;
        }

        function saveSession() {
            const session = {
                id: Date.now(),
                date: new Date().toISOString(),
                duration: document.getElementById('rec-duration').innerText,
                distance: totalDistance.toFixed(2),
                streetsVisited: streetsVisited,
                streetsRevisited: streetsRevisited,
                path: recordedPath.map(p => ({ lat: p.lat, lng: p.lng })),
                segments: Array.from(visitedSegments.keys())
            };

            recordingSessions.push(session);
            
            // Save to localStorage
            try {
                localStorage.setItem('recordingSessions', JSON.stringify(recordingSessions));
                alert(`Session saved successfully!\n\nDistance: ${session.distance} km\nDuration: ${session.duration}\nStreets: ${session.streetsVisited} visited, ${session.streetsRevisited} revisited`);
            } catch (e) {
                console.error('Failed to save session:', e);
                alert('Failed to save session to local storage');
            }

            // Reset for new session
            document.getElementById('save-session-btn').classList.add('hidden');
            document.getElementById('record-badge').innerText = 'Ready to Record';
            document.getElementById('record-badge').classList.remove('bg-green-100', 'text-green-700');
            document.getElementById('record-badge').classList.add('bg-gray-100', 'text-gray-700');
        }

        // Load saved sessions on init
        function loadSavedSessions() {
            try {
                const saved = localStorage.getItem('recordingSessions');
                if (saved) {
                    recordingSessions = JSON.parse(saved);
                    console.log('Loaded', recordingSessions.length, 'saved sessions');
                }
            } catch (e) {
                console.error('Failed to load sessions:', e);
            }
        }

        window.onload = function() {
            // Expose currentMode globally for backward compatibility
            window.currentMode = 'planner';
            
            // Expose simulationMode globally and set to true by default
            window.simulationMode = true;
            simulationMode = true;
            
            // Expose isLocationFound globally
            window.isLocationFound = false;
            
            // Expose trip control variables
            window.isDriving = false;
            window.isPaused = false;
            window.shouldEndTrip = false;
            window.isRecording = false;
            
            // Initialize map first (without panel dependencies)
            initMap();
            loadSavedSessions();
            
            // Initialize modular panel AFTER map (no CONFIG needed)
            Panel = initPanel(map);
            
            // NOW wire up the speed slider (after panel exists)
            const speedSlider = document.getElementById('speed-slider');
            if (speedSlider) {
                speedSlider.oninput = function() {
                    const val = parseInt(this.value);
                    currentSpeed = val;
                    document.getElementById('speed-display').innerText = val < 40 ? "Traffic" : val > 150 ? "Express" : "Normal";
                };
            }
            
            // Register app functions for panel to call
            // Most functions are already global, just ensure startTrip is accessible
            window.startTrip = startTrip;
            
            console.log('✅ App initialized with modular panel');
        };
    </script>
