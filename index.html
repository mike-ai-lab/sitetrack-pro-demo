<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Street Tracker - Riyadh</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script>
        // API Configuration
        const CONFIG = {
            TOMTOM_API_KEY: 'JyADf97GtHsnNPfFQcUUrc2YVS1m0u3I'
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #map { height: 100vh; width: 100vw; cursor: crosshair; }
        .car-icon-inner {
            transition: transform 0.6s ease-out;
            transform-origin: center center;
        }
        .car-marker-icon {
            z-index: 1000 !important;
            pointer-events: none;
        }
        .leaflet-marker-pane {
            z-index: 600 !important;
        }
        .leaflet-routing-container { display: none; }
        input[type=range] { accent-color: #000; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); }
        .recording-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        
        /* Tab System */
        .tab-btn {
            background: transparent;
            color: #6b7280;
        }
        .tab-btn.active {
            background: #000;
            color: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        
        /* Hide devtools inspector highlight */
        .element-inspector-highlight { display: none !important; }
        path.leaflet-interactive.element-inspector-highlight { display: none !important; }
        
        /* Mobile optimizations */
        @media (max-width: 640px) {
            .car-icon-inner {
                width: 50px !important;
                height: 50px !important;
            }
            .car-icon-inner svg {
                width: 50px !important;
                height: 50px !important;
            }
            #control-panel {
                top: 10px;
                left: 10px;
                right: auto;
                max-width: calc(100vw - 80px);
            }
            #control-panel > div {
                width: 100% !important;
                max-width: 100%;
            }
            /* Ensure history button doesn't overlap */
            #history-btn {
                top: 10px !important;
                right: 10px !important;
            }
        }
    </style>
</head>
<body class="bg-gray-100 overflow-hidden">

    <!-- Main Control Panel -->
    <div id="control-panel" class="absolute top-5 left-5 z-[1000] pointer-events-none">
        <div class="glass rounded-xl shadow-xl border border-gray-100 pointer-events-auto w-72 sm:w-80 overflow-hidden transition-all duration-300">
            <!-- Panel Header -->
            <div class="flex items-center justify-between p-3 bg-gradient-to-r from-gray-50 to-white border-b border-gray-100">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    <h1 class="text-xs font-bold text-gray-900" id="panel-title">Trip Planner</h1>
                </div>
                <button onclick="Panel.toggle()" class="p-1.5 hover:bg-gray-100 rounded-lg transition-colors" id="collapse-btn" title="Collapse">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" id="collapse-icon">
                        <polyline points="18 15 12 9 6 15"/>
                    </svg>
                </button>
            </div>

            <!-- Panel Body -->
            <div id="panel-body" class="transition-all duration-300 overflow-hidden" style="max-height: 600px;">
                <!-- Tab Switcher -->
                <div class="flex gap-1 p-2 bg-gray-50 border-b border-gray-100">
                    <button onclick="Panel.switchTab('planner')" class="tab-btn active flex-1 text-[10px] font-bold py-2 rounded-lg uppercase tracking-wider transition-all" id="tab-planner">
                        Planner
                    </button>
                    <button onclick="Panel.switchTab('recorder')" class="tab-btn flex-1 text-[10px] font-bold py-2 rounded-lg uppercase tracking-wider transition-all" id="tab-recorder">
                        Recorder
                    </button>
                </div>

                <!-- Tab Content Container -->
                <div class="p-4">
                    <!-- PLANNER TAB -->
                    <div id="planner-tab" class="tab-content space-y-3">
                        <div class="flex items-center justify-between">
                            <span id="trip-badge" class="bg-blue-100 text-blue-700 text-[9px] px-2 py-0.5 rounded uppercase font-bold">Set Pickup</span>
                            <div class="flex items-center gap-1.5">
                                <label class="text-[9px] font-bold text-gray-400">FOLLOW</label>
                                <input type="checkbox" id="follow-toggle" checked class="w-3.5 h-3.5 rounded">
                            </div>
                        </div>
                        
                        <div class="space-y-2">
                            <div id="pickup-box" class="flex items-center gap-2 p-2 bg-white rounded-lg border border-gray-200 cursor-pointer hover:border-blue-500 transition-all" onclick="startEditingPoint(0)">
                                <div class="w-2 h-2 bg-blue-500 rounded-full"></div>
                                <span id="pickup-label" class="text-[11px] text-gray-500 truncate italic">Set pickup...</span>
                            </div>
                            <div id="dest-box" class="flex items-center gap-2 p-2 bg-white rounded-lg border border-gray-200 cursor-pointer hover:border-red-500 transition-all" onclick="startEditingPoint(1)">
                                <div class="w-2 h-2 bg-red-500 rounded-full"></div>
                                <span id="dest-label" class="text-[11px] text-gray-500 truncate italic">Set destination...</span>
                            </div>
                        </div>

                        <div>
                            <div class="flex justify-between items-center mb-1">
                                <label class="text-[9px] font-bold text-gray-400 uppercase">Speed</label>
                                <span id="speed-display" class="text-[10px] font-bold text-gray-900">Normal</span>
                            </div>
                            <input type="range" id="speed-slider" min="10" max="250" value="80" class="w-full h-1 bg-gray-200 rounded-lg cursor-pointer">
                        </div>

                        <div class="flex gap-2">
                            <button id="start-btn" disabled onclick="handleStart()" class="flex-1 bg-black text-white text-[10px] font-bold py-2 rounded-lg hover:bg-gray-800 disabled:bg-gray-100 disabled:text-gray-300 transition-all uppercase">
                                Start
                            </button>
                            <button id="pause-btn" disabled onclick="togglePause()" class="hidden flex-1 bg-gray-100 text-black text-[10px] font-bold py-2 rounded-lg hover:bg-gray-200 transition-all uppercase">
                                Pause
                            </button>
                            <button id="end-btn" onclick="endTrip()" class="hidden flex-1 bg-red-500 text-white text-[10px] font-bold py-2 rounded-lg hover:bg-red-600 transition-all uppercase">
                                End
                            </button>
                        </div>
                        
                        <button id="reset-planner-btn" onclick="resetPlanner()" class="w-full bg-gray-200 text-gray-700 text-[10px] font-bold py-2 rounded-lg hover:bg-gray-300 transition-all uppercase">
                            Reset
                        </button>
                    </div>

                    <!-- RECORDER TAB -->
                    <div id="recorder-tab" class="tab-content space-y-3 hidden">
                        <div class="flex items-center justify-between">
                            <span id="record-badge" class="bg-gray-100 text-gray-700 text-[9px] px-2 py-0.5 rounded uppercase font-bold">Ready</span>
                            <div id="recording-indicator" class="hidden flex items-center gap-1.5">
                                <div class="w-1.5 h-1.5 bg-red-500 rounded-full recording-pulse"></div>
                                <span class="text-[9px] font-bold text-red-500">REC</span>
                            </div>
                        </div>

                        <div class="flex items-center justify-between p-2 bg-white rounded-lg border border-gray-200">
                            <span class="text-[9px] font-bold text-gray-700 uppercase">Auto Focus</span>
                            <input type="checkbox" id="auto-focus-toggle" checked class="w-3.5 h-3.5 rounded">
                        </div>

                        <div class="flex items-center justify-between p-2 bg-yellow-50 rounded-lg border border-yellow-200">
                            <span class="text-[9px] font-bold text-yellow-700 uppercase">Simulation</span>
                            <input type="checkbox" id="sim-mode-toggle" onchange="toggleSimMode()" class="w-3.5 h-3.5 rounded">
                        </div>
                        <p id="sim-hint" class="hidden text-[9px] text-yellow-600 italic -mt-2">Click map to navigate via streets</p>

                        <div class="bg-white p-3 rounded-lg border border-gray-200">
                            <div class="grid grid-cols-2 gap-2 text-center">
                                <div>
                                    <p class="text-[8px] text-gray-400 uppercase mb-0.5">Distance</p>
                                    <p id="rec-distance" class="text-sm font-bold text-gray-900">0.0 km</p>
                                </div>
                                <div>
                                    <p class="text-[8px] text-gray-400 uppercase mb-0.5">Time</p>
                                    <p id="rec-duration" class="text-sm font-bold text-gray-900">00:00</p>
                                </div>
                                <div>
                                    <p class="text-[8px] text-gray-400 uppercase mb-0.5">New</p>
                                    <p id="rec-streets" class="text-sm font-bold text-blue-600">0</p>
                                </div>
                                <div>
                                    <p class="text-[8px] text-gray-400 uppercase mb-0.5">Revisit</p>
                                    <p id="rec-revisited" class="text-sm font-bold text-orange-600">0</p>
                                </div>
                            </div>
                        </div>

                        <div class="space-y-1.5 text-[10px]">
                            <div class="flex items-center gap-2 text-gray-600">
                                <div class="w-2.5 h-2.5 bg-blue-500 rounded"></div>
                                <span>New street</span>
                            </div>
                            <div class="flex items-center gap-2 text-gray-600">
                                <div class="w-2.5 h-2.5 bg-orange-500 rounded"></div>
                                <span>Revisited</span>
                            </div>
                        </div>

                        <div class="flex gap-2">
                            <button id="start-recording-btn" onclick="startRecording()" disabled class="flex-1 bg-red-500 text-white text-[10px] font-bold p-2 rounded-lg hover:bg-red-600 disabled:bg-gray-300 disabled:cursor-not-allowed transition-all flex items-center justify-center" title="Start Recording">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="8"/></svg>
                            </button>
                            <button id="pause-recording-btn" disabled onclick="togglePauseRecording()" class="hidden flex-1 bg-yellow-500 text-white text-[10px] font-bold p-2 rounded-lg hover:bg-yellow-600 transition-all flex items-center justify-center" title="Pause">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                            </button>
                            <button id="resume-recording-btn" disabled onclick="togglePauseRecording()" class="hidden flex-1 bg-green-500 text-white text-[10px] font-bold p-2 rounded-lg hover:bg-green-600 transition-all flex items-center justify-center" title="Resume">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                            </button>
                            <button id="stop-recording-btn" disabled onclick="stopRecording()" class="hidden flex-1 bg-gray-900 text-white text-[10px] font-bold p-2 rounded-lg hover:bg-gray-800 transition-all flex items-center justify-center" title="Stop">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12"/></svg>
                            </button>
                        </div>

                        <button id="save-session-btn" disabled onclick="saveSession()" class="hidden w-full bg-green-500 text-white text-[10px] font-bold py-2 rounded-lg hover:bg-green-600 transition-all uppercase">
                            Save Session
                        </button>
                        
                        <button id="reset-recorder-btn" onclick="resetRecorder()" class="w-full bg-gray-200 text-gray-700 text-[10px] font-bold py-2 rounded-lg hover:bg-gray-300 transition-all uppercase">
                            Reset
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Floating Buttons - Right Bottom -->
    <div class="absolute bottom-5 right-5 z-[1000] pointer-events-auto flex flex-col gap-3">
        <!-- Traffic Toggle Button -->
        <button id="traffic-btn" onclick="toggleTraffic()" class="bg-white p-3 rounded-full shadow-lg border border-gray-200 hover:bg-gray-50 transition-all" title="Toggle Traffic">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="6" r="2"/>
                <circle cx="12" cy="12" r="2"/>
                <circle cx="12" cy="18" r="2"/>
                <line x1="12" y1="1" x2="12" y2="23"/>
            </svg>
        </button>
        
        <!-- Locate Me Button -->
        <button id="locate-btn" onclick="locateUser()" class="bg-white p-3 rounded-full shadow-lg border border-gray-200 hover:bg-gray-50 transition-all" title="Find My Location">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
        </button>
    </div>

    <!-- History Panel -->
    <div id="history-panel" class="absolute top-5 right-5 z-[1000] pointer-events-none hidden">
        <div class="glass p-4 rounded-2xl shadow-xl border border-gray-100 pointer-events-auto w-64 max-h-[40vh] flex flex-col">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Trip History</h2>
                <button onclick="toggleHistory()" class="p-1 hover:bg-gray-200 rounded-md transition">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div id="history-list" class="space-y-2 overflow-y-auto pr-1">
                <p class="text-[10px] text-gray-400 italic text-center py-4">No recent trips</p>
            </div>
        </div>
    </div>

    <!-- History Toggle Button -->
    <div class="absolute top-5 right-5 z-[999] pointer-events-auto">
        <button id="history-btn" onclick="toggleHistory()" class="bg-white p-3 rounded-full shadow-lg border border-gray-200 hover:bg-gray-50 transition-all" title="Trip History">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
            </svg>
        </button>
    </div>

    <!-- Analytics Window -->
    <div id="analytics" class="absolute bottom-5 left-5 z-[1000] pointer-events-none opacity-0 transition-opacity duration-500">
        <div class="bg-black/90 backdrop-blur-md text-white p-3 rounded-xl shadow-xl w-48 border border-white/10 pointer-events-auto">
            <div class="flex items-center justify-between mb-2">
                <span class="text-[9px] font-bold uppercase tracking-widest text-gray-400">Live Telemetry</span>
                <div class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></div>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <div><p class="text-[8px] text-gray-500">DISTANCE</p><p id="stat-dist" class="text-xs font-mono font-bold">0.0 km</p></div>
                <div><p class="text-[8px] text-gray-500">HEADING</p><p id="stat-head" class="text-xs font-mono font-bold">0°</p></div>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <script>
        let map, carMarker, routingControl, historyPoints = [];
        let waypoints = [];
        let currentHeading = 0;
        let isDriving = false;
        let isPaused = false;
        let routeCoords = [];
        let currentSegmentIndex = 0;
        let currentSpeed = 80;
        let shouldEndTrip = false;
        let editingPointIndex = null;
        let pickupMarker = null;
        let destMarker = null;
        let currentMode = 'planner';

        // Live Recording Variables
        let isRecording = false;
        let recordingStartTime = null;
        let recordingDuration = 0;
        let recordedPath = [];
        let visitedSegments = new Map();
        let pathPolylines = [];
        let watchId = null;
        let totalDistance = 0;
        let streetsVisited = 0;
        let streetsRevisited = 0;
        let durationInterval = null;
        let recordingSessions = [];
        let userLocationMarker = null;
        let isLocationFound = false;
        let simulationMode = false;
        let isRecordingPaused = false;
        let simulatedElapsedTime = 0;
        let isSimulationAnimating = false;
        let trafficLayer = null;
        let trafficEnabled = false;

        // Panel Controller - Clean Architecture
        const Panel = {
            isCollapsed: false,
            currentTab: 'planner',
            
            toggle() {
                this.isCollapsed = !this.isCollapsed;
                const body = document.getElementById('panel-body');
                const icon = document.getElementById('collapse-icon');
                const btn = document.getElementById('collapse-btn');
                
                if (this.isCollapsed) {
                    body.style.maxHeight = '0px';
                    body.style.opacity = '0';
                    icon.innerHTML = '<polyline points="6 9 12 15 18 9"/>';
                    btn.title = 'Expand';
                } else {
                    body.style.maxHeight = '600px';
                    body.style.opacity = '1';
                    icon.innerHTML = '<polyline points="18 15 12 9 6 15"/>';
                    btn.title = 'Collapse';
                }
            },
            
            switchTab(tab) {
                if (isDriving || isRecording) {
                    alert('Please stop the current activity before switching tabs');
                    return;
                }
                
                // Clear the previous tab's state completely
                if (this.currentTab === 'planner' && tab === 'recorder') {
                    resetPlanner();
                } else if (this.currentTab === 'recorder' && tab === 'planner') {
                    resetRecorder();
                }
                
                this.currentTab = tab;
                currentMode = tab;
                
                // Update tab buttons
                document.getElementById('tab-planner').classList.toggle('active', tab === 'planner');
                document.getElementById('tab-recorder').classList.toggle('active', tab === 'recorder');
                
                // Update tab content
                document.getElementById('planner-tab').classList.toggle('active', tab === 'planner');
                document.getElementById('recorder-tab').classList.toggle('active', tab === 'recorder');
                
                // Update title
                document.getElementById('panel-title').innerText = tab === 'planner' ? 'Trip Planner' : 'Live Recorder';
                
                // Update map cursor
                map.getContainer().style.cursor = tab === 'planner' ? 'crosshair' : 'default';
                
                // Ensure panel is expanded when switching tabs
                if (this.isCollapsed) {
                    this.toggle();
                }
            },
            
            init() {
                // Set initial active tab
                document.getElementById('planner-tab').classList.add('active');
            }
        };

        function initMap() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([24.7115, 46.6744], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

            // Initialize TomTom Traffic Layer for highways only (zoom 10-12 only)
            trafficLayer = L.tileLayer(
                `https://api.tomtom.com/traffic/map/4/tile/flow/relative/{z}/{x}/{y}.png?key=${CONFIG.TOMTOM_API_KEY}`,
                {
                    opacity: 0.5,
                    minZoom: 10,
                    maxZoom: 12,
                    attribution: '© TomTom'
                }
            );

            const carHtml = `
                <div class="car-icon-inner" id="car-inner" style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;">
                    <svg width="40" height="40" viewBox="0 0 100 100" style="display: block;">
                        <rect x="25" y="10" width="50" height="80" rx="15" fill="#1a1a1a" />
                        <rect x="30" y="22" width="40" height="18" rx="4" fill="#444" />
                        <rect x="30" y="12" width="8" height="4" rx="1" fill="#FFFACD" />
                        <rect x="62" y="12" width="8" height="4" rx="1" fill="#FFFACD" />
                    </svg>
                </div>
            `;

            const icon = L.divIcon({ 
                html: carHtml, 
                className: 'car-marker-icon', 
                iconSize: [40, 40], 
                iconAnchor: [20, 20] 
            });
            carMarker = L.marker([24.7115, 46.6744], { 
                icon: icon, 
                opacity: 0,
                zIndexOffset: 1000
            }).addTo(map);

            map.on('click', onMapClick);

            document.getElementById('speed-slider').oninput = function() {
                const val = parseInt(this.value);
                currentSpeed = val;
                document.getElementById('speed-display').innerText = val < 40 ? "Traffic" : val > 150 ? "Express" : "Normal";
            };
        }

        function toggleTraffic() {
            trafficEnabled = !trafficEnabled;
            const btn = document.getElementById('traffic-btn');
            
            if (trafficEnabled) {
                trafficLayer.addTo(map);
                btn.classList.add('bg-red-50', 'border-red-300');
                btn.querySelector('svg').style.stroke = '#ef4444';
            } else {
                map.removeLayer(trafficLayer);
                btn.classList.remove('bg-red-50', 'border-red-300');
                btn.querySelector('svg').style.stroke = 'currentColor';
            }
        }

        function onMapClick(e) {
            // Simulation mode for recording
            if (currentMode === 'recorder' && simulationMode && isRecording) {
                simulateMovement(e.latlng);
                return;
            }
            
            if (isDriving || currentMode === 'recorder') return;
            
            // If editing a point, update it
            if (editingPointIndex !== null) {
                updatePoint(editingPointIndex, e.latlng);
                return;
            }
            
            // Normal point setting flow
            if (waypoints.length >= 2) resetPointsOnly();

            waypoints.push(e.latlng);
            const markerColor = waypoints.length === 1 ? '#3b82f6' : '#ef4444';
            const marker = L.circleMarker(e.latlng, { 
                color: markerColor, 
                fillColor: markerColor, 
                fillOpacity: 0.5, 
                radius: 6 
            }).addTo(map);
            
            if (waypoints.length === 1) {
                pickupMarker = marker;
                document.getElementById('pickup-label').innerText = "Pickup point set";
                document.getElementById('trip-badge').innerText = "Set Destination";
            } else {
                destMarker = marker;
                document.getElementById('dest-label').innerText = "Destination point set";
                document.getElementById('trip-badge').innerText = "Ready";
                document.getElementById('start-btn').disabled = false;
                calculateRoute();
            }
        }

        function startEditingPoint(index) {
            if (isDriving) return;
            if (waypoints.length <= index) return;
            
            editingPointIndex = index;
            const boxId = index === 0 ? 'pickup-box' : 'dest-box';
            const labelId = index === 0 ? 'pickup-label' : 'dest-label';
            
            document.getElementById(boxId).classList.add('ring-2', 'ring-offset-2');
            document.getElementById(boxId).classList.add(index === 0 ? 'ring-blue-500' : 'ring-red-500');
            document.getElementById(labelId).innerText = "Click on map to update...";
            document.getElementById('trip-badge').innerText = "Editing Point";
        }

        function updatePoint(index, newLatLng) {
            waypoints[index] = newLatLng;
            
            // Remove old marker and create new one
            if (index === 0 && pickupMarker) {
                map.removeLayer(pickupMarker);
                pickupMarker = L.circleMarker(newLatLng, { 
                    color: '#3b82f6', 
                    fillColor: '#3b82f6', 
                    fillOpacity: 0.5, 
                    radius: 6 
                }).addTo(map);
            } else if (index === 1 && destMarker) {
                map.removeLayer(destMarker);
                destMarker = L.circleMarker(newLatLng, { 
                    color: '#ef4444', 
                    fillColor: '#ef4444', 
                    fillOpacity: 0.5, 
                    radius: 6 
                }).addTo(map);
            }
            
            // Update UI
            const boxId = index === 0 ? 'pickup-box' : 'dest-box';
            const labelId = index === 0 ? 'pickup-label' : 'dest-label';
            
            document.getElementById(boxId).classList.remove('ring-2', 'ring-offset-2', 'ring-blue-500', 'ring-red-500');

        async function startTrip() {
            isDriving = true;
            isPaused = false;
            shouldEndTrip = false;
            currentSegmentIndex = 0;
            currentSpeed = parseInt(document.getElementById('speed-slider').value);
            document.getElementById('start-btn').classList.add('hidden');
            document.getElementById('pause-btn').classList.remove('hidden');
            document.getElementById('pause-btn').disabled = false;
            document.getElementById('end-btn').classList.remove('hidden');
            document.getElementById('analytics').style.opacity = "1";
            
            carMarker.setLatLng(routeCoords[0]);
            carMarker.setOpacity(1);

            for (let i = 0; i < routeCoords.length - 1; i++) {
                if (shouldEndTrip) break;
                
                while (isPaused && !shouldEndTrip) await new Promise(r => setTimeout(r, 100));
                if (shouldEndTrip) break;
                
                const start = routeCoords[i];
                const end = routeCoords[i + 1];
                const distance = L.latLng(start.lat, start.lng).distanceTo(L.latLng(end.lat, end.lng));
                if (distance < 0.1) continue;

                const heading = getHeading(start, end);
                document.getElementById('car-inner').style.transform = `rotate(${heading}deg)`;
                document.getElementById('stat-head').innerText = `${Math.round(heading)}°`;

                const duration = Math.max((distance * 1000) / currentSpeed, 10);
                
                if (document.getElementById('follow-toggle').checked) {
                    map.panTo(carMarker.getLatLng(), { animate: true, duration: duration/1000 });
                }

                await moveSegment(start, end, duration);
            }

            if (!shouldEndTrip) {
                isDriving = false;
                document.getElementById('start-btn').classList.remove('hidden');
                document.getElementById('pause-btn').classList.add('hidden');
                document.getElementById('end-btn').classList.add('hidden');
                document.getElementById('trip-badge').innerText = "Done";
            }
        }

        function moveSegment(start, end, duration) {
            return new Promise(resolve => {
                const startTime = performance.now();
                let lastProgress = 0;
                
                function step(now) {
                    if (shouldEndTrip) { resolve(); return; }
                    if (isPaused) { requestAnimationFrame(step); return; }
                    
                    const elapsed = now - startTime;
                    // Recalculate duration based on current speed for smooth transitions
                    const distance = L.latLng(start.lat, start.lng).distanceTo(L.latLng(end.lat, end.lng));
                    const newDuration = Math.max((distance * 1000) / currentSpeed, 10);
                    
                    // Adjust progress based on speed changes
                    const progress = Math.min(elapsed / newDuration, 1);
                    
                    carMarker.setLatLng([
                        start.lat + (end.lat - start.lat) * progress, 
                        start.lng + (end.lng - start.lng) * progress
                    ]);
                    
                    if (progress < 1) requestAnimationFrame(step); 
                    else resolve();
                }
                requestAnimationFrame(step);
            });
        }

        function getHeading(p1, p2) {
            const lat1 = p1.lat * Math.PI / 180, lat2 = p2.lat * Math.PI / 180;
            const dLon = (p2.lng - p1.lng) * Math.PI / 180;
            const y = Math.sin(dLon) * Math.cos(lat2);
            const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
            let target = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
            if (Math.abs(target - currentHeading) > 180) currentHeading += (target > currentHeading ? -360 : 360);
            return currentHeading = target;
        }

        function simulateMovement(latlng) {
            if (!isRecording || isRecordingPaused || isSimulationAnimating) return;
            
            // If this is the first point or we need a new route
            if (recordedPath.length === 0) {
                // Just set the starting position
                const position = {
                    coords: {
                        latitude: latlng.lat,
                        longitude: latlng.lng
                    }
                };
                onPositionUpdate(position);
            } else {
                // Calculate route from current position to clicked point
                const currentPos = recordedPath[recordedPath.length - 1];
                calculateSimulationRoute(currentPos, latlng);
            }
        }

        function calculateSimulationRoute(from, to) {
            if (isSimulationAnimating) return; // Prevent multiple simultaneous routes
            
            isSimulationAnimating = true;
            
            // Use Leaflet Routing Machine to get street route
            const tempRouting = L.Routing.control({
                waypoints: [from, to],
                router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' }),
                show: false,
                addWaypoints: false,
                createMarker: function() { return null; },
                lineOptions: { 
                    styles: [{ color: 'transparent', opacity: 0, weight: 0 }],
                    addWaypoints: false
                }
            });

            tempRouting.on('routesfound', function(e) {
                const route = e.routes[0];
                const routeCoords = route.coordinates;
                
                // Animate along the route
                animateSimulationRoute(routeCoords).then(() => {
                    isSimulationAnimating = false;
                });
                
                // Remove temp routing control immediately
                try {
                    if (map.hasLayer(tempRouting)) {
                        map.removeControl(tempRouting);
                    }
                } catch(err) {
                    console.log('Routing control cleanup:', err);
                }
            });

            tempRouting.on('routingerror', function(e) {
                console.error('Routing error:', e);
                isSimulationAnimating = false;
                
                // Fallback to direct line if routing fails
                const position = {
                    coords: {
                        latitude: to.lat,
                        longitude: to.lng
                    }
                };
                onPositionUpdate(position);
                
                try {
                    if (map.hasLayer(tempRouting)) {
                        map.removeControl(tempRouting);
                    }
                } catch(err) {
                    console.log('Routing control cleanup:', err);
                }
            });

            // Add to map to trigger routing
            tempRouting.addTo(map);
        }

        async function animateSimulationRoute(routeCoords) {
            const speed = 50; // Points per second
            const interval = 1000 / speed;

            for (let i = 0; i < routeCoords.length; i++) {
                if (!isRecording) {
                    isSimulationAnimating = false;
                    break;
                }
                
                // Wait if paused
                while (isRecordingPaused && isRecording) {
                    await new Promise(resolve => setTimeout(resolve, 100));
                }
                
                if (!isRecording) {
                    isSimulationAnimating = false;
                    break;
                }
                
                const point = routeCoords[i];
                const position = {
                    coords: {
                        latitude: point.lat,
                        longitude: point.lng
                    }
                };
                onPositionUpdate(position);
                
                await new Promise(resolve => setTimeout(resolve, interval));
            }
        }

        function togglePauseRecording() {

                document.getElementById('recording-indicator').classList.add('hidden');
            } else {
                // Resumed
                document.getElementById('resume-recording-btn').classList.add('hidden');
                document.getElementById('pause-recording-btn').classList.remove('hidden');
                document.getElementById('record-badge').innerText = simulationMode ? 'Simulating' : 'Recording';
                document.getElementById('record-badge').classList.remove('bg-yellow-100', 'text-yellow-700');
                document.getElementById('record-badge').classList.add('bg-red-100', 'text-red-700');
                document.getElementById('recording-indicator').classList.remove('hidden');
            }
        }

        function stopRecording() {
            if (!isRecording) return;

            isRecording = false;
            isRecordingPaused = false;
            isSimulationAnimating = false; // Reset animation flag

            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }

            if (durationInterval) {
                clearInterval(durationInterval);
                durationInterval = null;
            }

            const simToggle = document.getElementById('sim-mode-toggle');
            if (simToggle) simToggle.disabled = false;

            // Update UI
            document.getElementById('start-recording-btn').classList.remove('hidden');
            document.getElementById('pause-recording-btn').classList.add('hidden');
            document.getElementById('resume-recording-btn').classList.add('hidden');
            document.getElementById('stop-recording-btn').classList.add('hidden');
            document.getElementById('recording-indicator').classList.add('hidden');
            document.getElementById('record-badge').innerText = 'Stopped';
            document.getElementById('record-badge').classList.remove('bg-red-100', 'text-red-700', 'bg-yellow-100', 'text-yellow-700');
            document.getElementById('record-badge').classList.add('bg-gray-100', 'text-gray-700');
            document.getElementById('save-session-btn').classList.remove('hidden');
            document.getElementById('save-session-btn').disabled = false;

            console.log('Recording stopped. Total points:', recordedPath.length);
        }

        function onPositionUpdate(position) {
            if (isRecordingPaused) return; // Don't update if paused

            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const newPoint = L.latLng(lat, lng);

            carMarker.setLatLng(newPoint);
            carMarker.setOpacity(1);

            // Auto focus if enabled
            if (document.getElementById('auto-focus-toggle').checked) {
                map.panTo(newPoint, { animate: true, duration: 0.5 });
            }

            if (recordedPath.length > 0) {
                const prevPoint = recordedPath[recordedPath.length - 1];
                const distance = prevPoint.distanceTo(newPoint);

                if (distance > 3) {
                    drawPathSegment(prevPoint, newPoint);
                    totalDistance += distance / 1000;
                    
                    // Calculate simulated time based on distance and speed (45 km/h)
                    if (simulationMode) {
                        const timeInHours = (distance / 1000) / 45; // distance in km / speed
                        const timeInSeconds = timeInHours * 3600;
                        simulatedElapsedTime += timeInSeconds;
                    }
                    
                    updateRecordingStats();
                    
                    const heading = getHeading(
                        { lat: prevPoint.lat, lng: prevPoint.lng },
                        { lat: newPoint.lat, lng: newPoint.lng }
                    );
                    document.getElementById('car-inner').style.transform = `rotate(${heading}deg)`;
                    
                    recordedPath.push(newPoint);
                }
            } else {
                map.setView(newPoint, 16);
                recordedPath.push(newPoint);
            }
        }

        function onPositionError(error) {
            console.error('Geolocation error:', error);
            
            // Don't stop recording on every error, just log it
            if (error.code === error.TIMEOUT) {
                console.warn('Position timeout, waiting for next update...');
                return; // Continue recording, just skip this update
            }
            
            let message = 'Location tracking error: ';
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    message += 'Location access denied. Recording stopped.';
                    stopRecording();
                    break;
                case error.POSITION_UNAVAILABLE:
                    message += 'Location unavailable. Make sure GPS is enabled.';
                    break;
            }
            
            if (error.code !== error.TIMEOUT) {
                alert(message);
            }
        }

        function drawPathSegment(start, end) {
            // Create a unique key for this segment (rounded to ~50m precision for street-level)
            const segmentKey = `${start.lat.toFixed(3)},${start.lng.toFixed(3)}-${end.lat.toFixed(3)},${end.lng.toFixed(3)}`;
            
            let color, weight, isRevisit;
            
            if (visitedSegments.has(segmentKey)) {
                // Already visited - orange color
                color = '#f97316';
                weight = 6;
                isRevisit = true;
                streetsRevisited++;
            } else {
                // First visit - blue color
                color = '#3b82f6';
                weight = 6;
                isRevisit = false;
                visitedSegments.set(segmentKey, true);
                streetsVisited++;
            }

            // Draw the polyline
            const polyline = L.polyline([start, end], {
                color: color,
                weight: weight,
                opacity: 0.7,
                lineCap: 'round',
                lineJoin: 'round'
            }).addTo(map);

            pathPolylines.push(polyline);
        }

        function updateDuration() {
            if (!isRecording || !recordingStartTime || isRecordingPaused) return;
            
            let elapsed;
            if (simulationMode) {
                // Use simulated time based on distance and speed
                elapsed = Math.floor(simulatedElapsedTime);
            } else {
                // Use real time
                elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
            }
            
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            document.getElementById('rec-duration').innerText = 
                `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function updateRecordingStats() {
            document.getElementById('rec-distance').innerText = `${totalDistance.toFixed(2)} km`;
            document.getElementById('rec-streets').innerText = streetsVisited;
            document.getElementById('rec-revisited').innerText = streetsRevisited;
        }

        function saveSession() {
            const session = {
                id: Date.now(),
                date: new Date().toISOString(),
                duration: document.getElementById('rec-duration').innerText,
                distance: totalDistance.toFixed(2),
                streetsVisited: streetsVisited,
                streetsRevisited: streetsRevisited,
                path: recordedPath.map(p => ({ lat: p.lat, lng: p.lng })),
                segments: Array.from(visitedSegments.keys())
            };

            recordingSessions.push(session);
            
            // Save to localStorage
            try {
                localStorage.setItem('recordingSessions', JSON.stringify(recordingSessions));
                alert(`Session saved successfully!\n\nDistance: ${session.distance} km\nDuration: ${session.duration}\nStreets: ${session.streetsVisited} visited, ${session.streetsRevisited} revisited`);
            } catch (e) {
                console.error('Failed to save session:', e);
                alert('Failed to save session to local storage');
            }

            // Reset for new session
            document.getElementById('save-session-btn').classList.add('hidden');
            document.getElementById('record-badge').innerText = 'Ready to Record';
            document.getElementById('record-badge').classList.remove('bg-green-100', 'text-green-700');
            document.getElementById('record-badge').classList.add('bg-gray-100', 'text-gray-700');
        }

        // Load saved sessions on init
        function loadSavedSessions() {
            try {
                const saved = localStorage.getItem('recordingSessions');
                if (saved) {
                    recordingSessions = JSON.parse(saved);
                    console.log('Loaded', recordingSessions.length, 'saved sessions');
                }
            } catch (e) {
                console.error('Failed to load sessions:', e);
            }
        }

        window.onload = function() {
            initMap();
            loadSavedSessions();
            Panel.init();
        };
    </script>
</body>
</html>
