<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConstructTrack - Field Sales Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide-react/0.263.1/lucide-react.min.js"></script>
    <style>
        :root {
            --primary-blue: #2563eb;
            --visited-blue: rgba(37, 99, 235, 0.2);
        }
        
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        /* Simulated Map Styling */
        #map-canvas {
            background-color: #f8fafc;
            background-image: 
                linear-gradient(#e2e8f0 1px, transparent 1px),
                linear-gradient(90deg, #e2e8f0 1px, transparent 1px);
            background-size: 50px 50px;
            cursor: crosshair;
            position: relative;
            overflow: hidden;
        }

        .map-street {
            position: absolute;
            background: #cbd5e1;
            transition: background 0.5s ease;
        }

        .map-street.visited {
            background: var(--primary-blue);
            box-shadow: 0 0 15px var(--primary-blue);
        }

        .pin {
            position: absolute;
            transform: translate(-50%, -100%);
            cursor: pointer;
            transition: transform 0.2s;
            z-index: 10;
        }

        .pin:hover {
            transform: translate(-50%, -110%) scale(1.1);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .status-dot {
            height: 8px;
            width: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }

        .role-badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 999px;
            font-weight: 600;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="bg-gray-100 flex h-screen">

    <!-- Sidebar -->
    <aside class="w-80 glass-panel z-20 flex flex-col h-full">
        <div class="p-6 border-b">
            <h1 class="text-2xl font-bold text-blue-600 flex items-center gap-2">
                <i data-lucide="hard-hat"></i> ConstructTrack
            </h1>
            <p class="text-xs text-gray-500 mt-1 uppercase tracking-wider">Field Sales Dashboard</p>
        </div>

        <div class="p-4 flex-1 overflow-y-auto">
            <!-- Stats -->
            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="bg-blue-50 p-3 rounded-xl border border-blue-100">
                    <p class="text-xs text-blue-600 font-medium">Pins Today</p>
                    <p id="stat-pins" class="text-xl font-bold text-blue-900">0</p>
                </div>
                <div class="bg-indigo-50 p-3 rounded-xl border border-indigo-100">
                    <p class="text-xs text-indigo-600 font-medium">Coverage</p>
                    <p id="stat-coverage" class="text-xl font-bold text-indigo-900">0%</p>
                </div>
            </div>

            <!-- Lead List -->
            <div class="space-y-4">
                <h3 class="text-sm font-semibold text-gray-700 flex items-center gap-2">
                    <i data-lucide="list"></i> Recent Leads
                </h3>
                <div id="lead-list" class="space-y-2 text-sm">
                    <!-- Dynamic Leads -->
                    <p class="text-gray-400 text-center py-4">Click map to add a project</p>
                </div>
            </div>
        </div>

        <div class="p-4 bg-gray-50 border-t">
            <button onclick="toggleTracking()" id="tracking-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl shadow-lg transition flex items-center justify-center gap-2">
                <i data-lucide="navigation"></i> <span id="tracking-text">Start Tracking</span>
            </button>
        </div>
    </aside>

    <!-- Main Map Area -->
    <main class="flex-1 relative flex flex-col">
        <!-- Top Search/Filter Bar -->
        <div class="absolute top-6 left-6 right-6 flex justify-between items-center pointer-events-none z-10">
            <div class="flex gap-4 pointer-events-auto">
                <div class="relative">
                    <input type="text" placeholder="Search districts..." class="w-72 pl-10 pr-4 py-2 rounded-lg glass-panel focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <i data-lucide="search" class="absolute left-3 top-2.5 text-gray-400 w-4 h-4"></i>
                </div>
            </div>
            
            <div class="flex gap-2 pointer-events-auto">
                <div class="glass-panel px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2">
                    <span class="status-dot bg-green-500"></span> Online: Riyadh Center
                </div>
            </div>
        </div>

        <!-- Simulated Map Canvas -->
        <div id="map-canvas" class="flex-1" onclick="handleMapClick(event)">
             <!-- Streets -->
             <div class="map-street" style="top: 20%; left: 0; width: 100%; height: 12px;"></div>
             <div class="map-street" style="top: 50%; left: 0; width: 100%; height: 12px;"></div>
             <div class="map-street" style="top: 80%; left: 0; width: 100%; height: 12px;"></div>
             <div class="map-street" style="top: 0; left: 30%; width: 12px; height: 100%;"></div>
             <div class="map-street" style="top: 0; left: 60%; width: 12px; height: 100%;"></div>
        </div>
    </main>

    <!-- Project Form Modal (Hidden by default) -->
    <div id="project-modal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center">
        <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">New Construction Lead</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600"><i data-lucide="x"></i></button>
            </div>
            <form id="project-form" class="space-y-4">
                <input type="hidden" id="form-x">
                <input type="hidden" id="form-y">
                
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Project Name / Contact</label>
                    <input type="text" id="contact-name" required class="w-full px-4 py-2 border rounded-lg" placeholder="e.g. Al-Narges Villa">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Role</label>
                        <select id="contact-role" class="w-full px-4 py-2 border rounded-lg">
                            <option>Contractor</option>
                            <option>Foreman</option>
                            <option>Architect</option>
                            <option>Supplier</option>
                            <option>Concierge</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Phone</label>
                        <input type="tel" id="contact-phone" class="w-full px-4 py-2 border rounded-lg" placeholder="+966 ...">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Notes</label>
                    <textarea id="contact-notes" rows="3" class="w-full px-4 py-2 border rounded-lg" placeholder="Structural stage, need insulation?"></textarea>
                </div>

                <div class="flex items-center gap-2">
                    <input type="checkbox" id="follow-up" class="w-4 h-4 text-blue-600">
                    <label for="follow-up" class="text-sm font-medium">Requires follow-up</label>
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700">Save Pin</button>
            </form>
        </div>
    </div>

    <!-- Details View Modal -->
    <div id="detail-modal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center">
        <div class="bg-white rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl">
            <div id="detail-header" class="bg-blue-600 p-6 text-white">
                <span id="detail-badge" class="role-badge bg-white/20 mb-2 inline-block">Role</span>
                <h2 id="detail-name" class="text-2xl font-bold">Project Name</h2>
            </div>
            <div class="p-6 space-y-4">
                <div class="flex items-center gap-3">
                    <i data-lucide="phone" class="text-gray-400"></i>
                    <span id="detail-phone" class="text-gray-700">Phone</span>
                </div>
                <div class="flex items-start gap-3">
                    <i data-lucide="file-text" class="text-gray-400 mt-1"></i>
                    <p id="detail-notes" class="text-gray-600 text-sm italic">Notes go here...</p>
                </div>
                <div id="detail-status" class="pt-2 border-t text-xs font-bold uppercase tracking-widest">
                    Status: <span id="status-text">Pending</span>
                </div>
                <button onclick="closeDetail()" class="w-full mt-4 border py-2 rounded-lg font-semibold hover:bg-gray-50">Close</button>
            </div>
        </div>
    </div>

    <script>
        // State Management
        let projects = [];
        let isTracking = false;
        let coverage = 0;

        // Initialize Icons Safely
        function initIcons() {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        }

        // Map Interaction
        function handleMapClick(e) {
            if (e.target.closest('.pin')) return;
            const rect = document.getElementById('map-canvas').getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            openModal(x, y);
        }

        function openModal(x, y) {
            document.getElementById('form-x').value = x;
            document.getElementById('form-y').value = y;
            document.getElementById('project-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('project-modal').classList.add('hidden');
            document.getElementById('project-form').reset();
        }

        // Project Submission
        document.getElementById('project-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const newProject = {
                id: Date.now(),
                x: document.getElementById('form-x').value,
                y: document.getElementById('form-y').value,
                name: document.getElementById('contact-name').value,
                role: document.getElementById('contact-role').value,
                phone: document.getElementById('contact-phone').value,
                notes: document.getElementById('contact-notes').value,
                followUp: document.getElementById('follow-up').checked
            };
            projects.push(newProject);
            renderPin(newProject);
            updateSidebar();
            closeModal();
            updateStats();
        });

        function renderPin(project) {
            const pin = document.createElement('div');
            pin.className = 'pin';
            pin.style.left = project.x + 'px';
            pin.style.top = project.y + 'px';
            pin.innerHTML = `
                <svg width="32" height="42" viewBox="0 0 24 24" fill="${project.followUp ? '#ef4444' : '#2563eb'}" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                    <circle cx="12" cy="10" r="3" fill="white"></circle>
                </svg>
            `;
            pin.onclick = (e) => {
                e.stopPropagation();
                showDetail(project);
            };
            document.getElementById('map-canvas').appendChild(pin);
        }

        function showDetail(project) {
            document.getElementById('detail-name').innerText = project.name;
            document.getElementById('detail-badge').innerText = project.role;
            document.getElementById('detail-phone').innerText = project.phone || 'No phone provided';
            document.getElementById('detail-notes').innerText = project.notes || 'No notes added.';
            document.getElementById('status-text').innerText = project.followUp ? 'Action Required' : 'Completed';
            document.getElementById('status-text').className = project.followUp ? 'text-red-600' : 'text-green-600';
            document.getElementById('detail-modal').classList.remove('hidden');
            initIcons();
        }

        function closeDetail() {
            document.getElementById('detail-modal').classList.add('hidden');
        }

        function updateSidebar() {
            const list = document.getElementById('lead-list');
            if (projects.length === 0) return;
            list.innerHTML = projects.slice(-5).reverse().map(p => `
                <div class="p-3 bg-white border rounded-lg shadow-sm hover:border-blue-400 cursor-pointer transition" onclick="showDetailById(${p.id})">
                    <div class="flex justify-between items-start">
                        <span class="font-bold text-gray-800">${p.name}</span>
                        <span class="role-badge bg-blue-100 text-blue-700">${p.role}</span>
                    </div>
                    <p class="text-xs text-gray-500 mt-1 truncate">${p.notes}</p>
                </div>
            `).join('');
        }

        function showDetailById(id) {
            const project = projects.find(p => p.id === id);
            if (project) showDetail(project);
        }

        function updateStats() {
            document.getElementById('stat-pins').innerText = projects.length;
        }

        function toggleTracking() {
            isTracking = !isTracking;
            const btn = document.getElementById('tracking-btn');
            const txt = document.getElementById('tracking-text');
            if (isTracking) {
                btn.classList.replace('bg-blue-600', 'bg-red-500');
                btn.classList.replace('hover:bg-blue-700', 'hover:bg-red-600');
                txt.innerText = 'Stop Tracking';
                startSimulatingMovement();
            } else {
                btn.classList.replace('bg-red-500', 'bg-blue-600');
                btn.classList.replace('hover:bg-red-600', 'hover:bg-blue-700');
                txt.innerText = 'Start Tracking';
            }
        }

        function startSimulatingMovement() {
            const streets = document.querySelectorAll('.map-street');
            let index = 0;
            const interval = setInterval(() => {
                if (!isTracking) {
                    clearInterval(interval);
                    return;
                }
                if (index < streets.length) {
                    streets[index].classList.add('visited');
                    index++;
                    coverage = Math.round((index / streets.length) * 100);
                    document.getElementById('stat-coverage').innerText = coverage + '%';
                } else {
                    clearInterval(interval);
                }
            }, 2000);
        }

        window.onload = () => {
            initIcons();
            const demo = {
                id: 1,
                x: 400,
                y: 300,
                name: "Al-Faisaliyah Tower Refurb",
                role: "Foreman",
                phone: "+966 50 123 4567",
                notes: "Discussing glass cleaning contracts.",
                followUp: true
            };
            projects.push(demo);
            renderPin(demo);
            updateSidebar();
            updateStats();
        };
    </script>
</body>
</html>
