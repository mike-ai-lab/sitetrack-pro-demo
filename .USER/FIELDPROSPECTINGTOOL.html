<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studiø Field Prospecting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;500;600&display=swap');
        
        body { font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; background: #fff; }
        h1, h2, .serif { font-family: 'Playfair Display', serif; }

        #map { height: 100vh; width: 100vw; z-index: 1; background: #f8f8f8; cursor: crosshair; }

        .fab {
            position: fixed; bottom: 30px; left: 24px; width: 64px; height: 64px;
            background: black; color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 100;
        }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
            z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px;
        }

        #formModal { z-index: 1100; }
        #leadDetailsModal { z-index: 1050; }

        .modal-content {
            background: white; width: 100%; max-width: 450px;
            max-height: 85vh; border-radius: 24px; overflow-y: auto;
            position: relative; box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }

        #exportModal .modal-content { max-width: 950px; }
        #leadDetailsModal .modal-content { max-width: 650px; }

        .pin-container { transition: all 0.2s ease; cursor: pointer; }
        .pin-container:hover { z-index: 50; transform: scale(1.1); }

        .tooltip {
            display: none; position: absolute; bottom: 120%; left: 50%;
            transform: translateX(-50%); width: 180px; background: #0f172a;
            color: white; padding: 12px; border-radius: 8px; font-size: 11px;
            z-index: 60; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .pin-container:hover .tooltip { display: block; }

        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .status-closed { opacity: 0.5; filter: grayscale(0.2); }
        .leaflet-control-zoom { display: none !important; }
        .leaflet-routing-container { display: none !important; }

        .export-table { width: 100%; border-collapse: collapse; font-size: 11px; text-align: left; }
        .export-table th { padding: 12px 8px; border-bottom: 2px solid #f1f5f9; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 800; }
        .export-table td { padding: 12px 8px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
        .export-table .pin-container { position: relative; display: inline-flex; }

        .toast {
            position: fixed; bottom: 30px; right: 30px; z-index: 2000;
            background: #0f172a; color: white; padding: 16px 24px;
            border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: flex; align-items: center; gap: 12px;
            font-size: 14px; font-weight: 600;
            transform: translateY(150%); opacity: 0;
            transition: all 0.3s ease;
        }
        .toast.show { transform: translateY(0); opacity: 1; }

        .image-cell { position: relative; width: 60px; }
        .thumb-preview { 
            width: 40px; height: 40px; border-radius: 8px; object-fit: cover; 
            border: 1px solid #e2e8f0; cursor: zoom-in; transition: transform 0.2s;
        }
        .image-cell:hover .hover-zoom { 
            display: block; position: absolute; bottom: 100%; left: 0; 
            z-index: 100; width: 150px; height: 150px; border-radius: 12px;
            object-fit: cover; border: 4px solid white; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .hover-zoom { display: none; pointer-events: none; }

        #lightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <button class="fab" id="addPinBtn">
        <i data-lucide="map-pin"></i>
    </button>

    <div class="fixed top-6 left-6 right-6 z-[100] flex justify-between items-start pointer-events-none">
        <div class="bg-white p-5 rounded-2xl shadow-2xl pointer-events-auto border border-gray-100 flex items-center gap-4">
            <div>
                <h1 class="text-xl font-bold italic leading-tight">Studiø Field</h1>
                <div id="sessionStats" class="text-[10px] text-gray-400 uppercase tracking-tighter mt-0.5">
                    Standby • 0 Leads • 0.0km
                </div>
            </div>
            <div class="h-8 w-[1px] bg-gray-100"></div>
            <button id="toggleSessionBtn" class="flex items-center gap-2 px-4 py-2 rounded-full bg-black text-white text-xs font-bold transition-all active:scale-95">
                <i id="sessionIcon" data-lucide="play" class="w-3 h-3 fill-current"></i>
                <span id="sessionText">START SESSION</span>
            </button>
        </div>

        <div class="flex flex-col gap-2">
            <button id="simToggleBtn" class="bg-white px-4 py-3 rounded-2xl shadow-xl pointer-events-auto border border-gray-100 text-[10px] font-black tracking-tighter flex items-center gap-2 transition-colors">
                <div id="simIndicator" class="w-2 h-2 rounded-full bg-gray-300"></div>
                SIM MODE
            </button>
            <button id="exportBtn" class="bg-white p-4 rounded-2xl shadow-xl pointer-events-auto border border-gray-100 hover:bg-gray-50 transition-colors">
                <i data-lucide="table" class="w-5 h-5 text-gray-600"></i>
            </button>
            <button id="centerBtn" class="bg-white p-4 rounded-2xl shadow-xl pointer-events-auto border border-gray-100 hover:bg-gray-50 active:bg-gray-200">
                <i data-lucide="navigation" class="w-5 h-5 text-gray-600"></i>
            </button>
        </div>
    </div>

    <div id="formModal" class="modal-overlay">
        <div class="modal-content overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-6 bg-gray-50 border-b flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div id="modal-preview-pin"></div>
                    <div>
                        <h3 id="modal-title" class="text-lg font-bold text-gray-900">Specify Lead Pin</h3>
                        <p id="modal-subtitle" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">New Entry</p>

                </div>

            <div class="p-6 space-y-5 overflow-y-auto flex-1 custom-scroll">

                    <div class="grid grid-cols-4 gap-2" id="priority-options"></div>

                <div class="space-y-2">

                    <div class="flex gap-2" id="status-options"></div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest">Site Photos</label>
                    <div class="flex flex-wrap gap-2" id="image-preview-container">

                    <input type="text" id="contactPhone" placeholder="05XXXXXXXX" class="w-full p-2.5 bg-white border border-gray-200 rounded-lg text-sm outline-none">

                <textarea id="siteNotes" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none h-24 resize-none" placeholder="Notes..."></textarea>
            </div>
            <div class="p-4 bg-gray-50 border-t flex items-center gap-3">

                <div class="flex items-center gap-2">
                    <button onclick="exportLeadAsText()" class="w-10 h-10 bg-gray-900 text-white rounded-full flex items-center justify-center hover:bg-gray-800 transition-all active:scale-90" title="Export as Text">

            <div class="flex-1 overflow-y-auto p-6 space-y-6 custom-scroll">

                    <div class="space-y-1">

                <div class="space-y-2">

    <div id="lightbox" onclick="closeLightbox()">
        <button class="absolute top-10 right-10 text-white"><i data-lucide="x" class="w-10 h-10"></i></button>
        <button onclick="event.stopPropagation(); prevImage()" class="absolute left-10 text-white p-4 bg-white/10 rounded-full"><i data-lucide="chevron-left"></i></button>
        <img id="lightboxImg" class="max-w-[85vw] max-h-[80vh] object-contain shadow-2xl rounded-lg">
        <button onclick="event.stopPropagation(); nextImage()" class="absolute right-10 text-white p-4 bg-white/10 rounded-full"><i data-lucide="chevron-right"></i></button>

    <div id="toast" class="toast">
        <i data-lucide="check-circle" class="w-5 h-5"></i>
        <span id="toast-message">Copied!</span>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <script>
        let map, userMarker, pathPolyline, plannedPolyline;
        let isRecording = false, isSimulationMode = false, isMoving = false;
        let pins = [], pathPoints = [], userLocation = [24.7136, 46.6753], totalDistance = 0;
        let navQueue = [], lastQueuedLocation = null;
        let routeSeq = 0, routePending = {}, routeNextFlush = 0;
        let currentFormData = { priority: 'Normal', status: 'Active', role: 'Owner', phase: 'ST', images: [] };
        let lightboxState = { images: [], index: 0 };

        const priorities = [{label:'Critical',color:'#ef4444'}, {label:'High',color:'#f97316'}, {label:'Normal',color:'#3b82f6'}, {label:'Low',color:'#94a3b8'}];
        const roles = [{label:'Owner',icon:'star'}, {label:'Client',icon:'star'}, {label:'Consultant',icon:'square'}, {label:'Contractor',icon:'triangle'}, {label:'Foreman',icon:'circle'}];
        const phases = ['ST', 'INT', 'FD', 'EX', 'CL'];
        const statuses = ['New', 'Active', 'On Hold', 'Closed'];

        window.onload = () => {
            lucide.createIcons();
            initMap();
            initFormOptions();
            document.getElementById('centerBtn').onclick = () => { if (!isSimulationMode) requestLocation(); };
            document.getElementById('toggleSessionBtn').onclick = toggleSession;
            document.getElementById('simToggleBtn').onclick = toggleSimulation;
            document.getElementById('addPinBtn').onclick = dropPinAtUser;
            document.getElementById('exportBtn').onclick = showExport;
            document.getElementById('copyMarkdownBtn').onclick = copyMarkdown;
            document.getElementById('copyWithImagesBtn').onclick = copyMarkdownWithImages;
            document.getElementById('exportPdfBtn').onclick = exportSessionAsPDF;
            
            map.on('click', (e) => {
                if (isSimulationMode) planRoute(e.latlng);
            });
            requestLocation();
        };

        function initMap() {
            map = L.map('map', { zoomControl: false, maxZoom: 22 }).setView(userLocation, 15);
            
            // Google Maps tiles with labels - same as main app
            L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
                maxZoom: 20,
                subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
                attribution: '© Google Maps'
            }).addTo(map);
            
            pathPolyline = L.polyline([], { color: '#007AFF', weight: 6, opacity: 0.8 }).addTo(map);
            plannedPolyline = L.polyline([], { color: '#007AFF', weight: 4, opacity: 0.4, dashArray: '10, 10' }).addTo(map);
            updateMarker(userLocation);
        }

        function updateMarker(pos) {
            if (userMarker) userMarker.setLatLng(pos);
            else userMarker = L.circleMarker(pos, { radius: 10, fillColor: "#007AFF", color: "white", weight: 4, fillOpacity: 1 }).addTo(map);
        }

        function toggleSimulation() {
            isSimulationMode = !isSimulationMode;
            navQueue = []; isMoving = false;
            plannedPolyline.setLatLngs([]);
            lastQueuedLocation = null;
            routeSeq = 0; routePending = {}; routeNextFlush = 0;
            const dot = document.getElementById('simIndicator');
            dot.className = isSimulationMode ? 'w-2 h-2 rounded-full bg-green-500' : 'w-2 h-2 rounded-full bg-gray-300';
            if (!isSimulationMode) requestLocation();
        }

        function planRoute(targetLatLng) {
            const start = lastQueuedLocation || L.latLng(userLocation[0], userLocation[1]);
            lastQueuedLocation = targetLatLng;
            const seq = routeSeq++;
            const router = new L.Routing.OSRMv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' });
            router.route([{ latLng: start }, { latLng: targetLatLng }], (err, routes) => {
                if (!err && routes && routes[0]) {
                    routePending[seq] = routes[0].coordinates;
                    flushRoutes();
                }
            });
        }

        function flushRoutes() {
            while (routePending[routeNextFlush] !== undefined) {
                const coords = routePending[routeNextFlush];
                delete routePending[routeNextFlush];
                routeNextFlush++;
                
                // Add to navigation queue
                navQueue.push(coords);
                
                // Update planned polyline to show all queued routes
                const allPlannedPoints = navQueue.flat().map(c => [c.lat, c.lng]);
                plannedPolyline.setLatLngs(allPlannedPoints);
            }
            
            // Only start processing if not already moving
            if (!isMoving) {
                processQueue();
            }
        }

        async function processQueue() {
            if (isMoving || navQueue.length === 0) return;
            isMoving = true;
            
            while (navQueue.length > 0) {
                const segment = navQueue.shift();
                
                // Animate through EVERY point in the route to follow roads properly
                for (let i = 0; i < segment.length; i++) {
                    const point = segment[i];
                    const prevLoc = userLocation;
                    userLocation = [point.lat, point.lng];
                    updateMarker(userLocation);
                    
                    if (isRecording) {
                        pathPoints.push(userLocation);
                        pathPolyline.setLatLngs(pathPoints);
                        if (prevLoc) totalDistance += map.distance(prevLoc, userLocation) / 1000;
                        updateStats();
                    }
                    
                    // Update planned polyline to show remaining route
                    const remainingSegment = segment.slice(i + 1);
                    const remainingQueue = [remainingSegment, ...navQueue].filter(s => s.length > 0);
                    const remainingPoints = remainingQueue.flat().map(c => [c.lat, c.lng]);
                    plannedPolyline.setLatLngs(remainingPoints);
                    
                    // Faster animation since we're going through every point
                    await new Promise(r => setTimeout(r, 10));
                }
            }
            
            // Clear planned route when done
            plannedPolyline.setLatLngs([]);
            isMoving = false;
        }

        function handleImageUpload(e) {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    currentFormData.images.push(event.target.result);
                    renderFormImages();
                };
                reader.readAsDataURL(file);
            });
        }

        function renderFormImages() {
            const container = document.getElementById('image-preview-container');
            const uploadBtn = container.querySelector('label');
            container.innerHTML = ''; container.appendChild(uploadBtn);
            currentFormData.images.forEach((img, idx) => {
                const div = document.createElement('div');
                div.className = 'relative w-16 h-16';

async function exportSessionAsPDF() {
    const btn = document.getElementById('exportPdfBtn');
    btn.disabled = true;
    btn.innerHTML = '<i data-lucide="loader" class="w-4 h-4 animate-spin"></i>';
    lucide.createIcons();

    try {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        const pageWidth = doc.internal.pageSize.getWidth();
        const pageHeight = doc.internal.pageSize.getHeight();
        const margin = 12;
        let yPos = 0;

        // White background
        doc.setFillColor(255, 255, 255);
        doc.rect(0, 0, pageWidth, pageHeight, 'F');

        // Compact Header
        doc.setTextColor(15, 23, 42);
        doc.setFontSize(18);
        doc.setFont("helvetica", "bold");
        doc.text('Session Summary', margin, 15);
        
        doc.setFontSize(9);
        doc.setFont("helvetica", "normal");
        doc.setTextColor(100, 116, 139);
        const sessionMeta = `${pins.length} LEADS • ${totalDistance.toFixed(2)} KM • ${new Date().toLocaleDateString('en-GB')}`;
        doc.text(sessionMeta, margin, 21);

        // Thin separator line
        doc.setDrawColor(226, 232, 240);
        doc.setLineWidth(0.3);
        doc.line(margin, 24, pageWidth - margin, 24);

        yPos = 28;

        for (let i = 0; i < pins.length; i++) {
            const pin = pins[i];
            
            // Calculate lead height (base + images if any)
            const baseHeight = 35;
            const hasImages = pin.images && pin.images.length > 0;
            const imageHeight = hasImages ? 25 : 0;
            const totalLeadHeight = baseHeight + imageHeight;
            
            // Page break check
            if (yPos + totalLeadHeight > pageHeight - 15) {
                doc.addPage();
                yPos = 15;
            }

            const leadStartY = yPos;

            // Priority indicator circle
            const prio = priorities.find(p => p.label === pin.priority);
            const rgb = hexToRgb(prio.color);
            doc.setFillColor(rgb.r, rgb.g, rgb.b);
            doc.circle(margin + 4, yPos + 3, 2.5, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(7);
            doc.text(`${pin.index}`, margin + 4, yPos + 4.2, { align: 'center' });

            // Define three columns
            const col1X = margin + 10;
            const col2X = margin + 75;
            const col3X = margin + 135;
            
            let col1Y = yPos;
            let col2Y = yPos;
            let col3Y = yPos;

            // ===== COLUMN 1: Lead Name, Role, Location, Notes =====
            
            // Lead Name
            doc.setTextColor(15, 23, 42);
            doc.setFont("helvetica", "bold");
            doc.setFontSize(11);
            const leadName = pin.data.name || 'Anonymous';
            const nameLines = doc.splitTextToSize(leadName, 60);
            doc.text(nameLines, col1X, col1Y + 4);
            col1Y += nameLines.length * 4.5 + 5;

            // Role
            doc.setTextColor(71, 85, 105);
            doc.setFontSize(8);
            doc.setFont("helvetica", "bold");
            doc.text('ROLE', col1X, col1Y);
            doc.setTextColor(30, 41, 59);
            doc.setFontSize(9);
            doc.setFont("helvetica", "normal");
            doc.text(pin.role, col1X, col1Y + 4);
            col1Y += 10;

            // Location
            doc.setTextColor(71, 85, 105);
            doc.setFontSize(8);
            doc.setFont("helvetica", "bold");
            doc.text('LOCATION', col1X, col1Y);
            
            const address = await getAddressFromCoords(pin.lat, pin.lng);
            doc.setTextColor(30, 41, 59);
            doc.setFontSize(9);
            doc.setFont("helvetica", "normal");
            const addressLines = doc.splitTextToSize(address, 60);
            doc.text(addressLines, col1X, col1Y + 4);
            col1Y += addressLines.length * 4 + 6;

            // Notes
            if (pin.data.notes) {
                doc.setTextColor(71, 85, 105);
                doc.setFontSize(8);
                doc.setFont("helvetica", "bold");
                doc.text('NOTES', col1X, col1Y);
                
                doc.setTextColor(30, 41, 59);
                doc.setFontSize(9);
                doc.setFont("helvetica", "normal");
                const notesLines = doc.splitTextToSize(pin.data.notes, 60);
                doc.text(notesLines, col1X, col1Y + 4);
                col1Y += notesLines.length * 4 + 4;
            }

            // ===== COLUMN 2: Contact Number, Get Direction =====
            
            // Contact Number
            doc.setTextColor(71, 85, 105);
            doc.setFontSize(8);
            doc.setFont("helvetica", "bold");
            doc.text('CONTACT', col2X, col2Y + 4);
            
            doc.setTextColor(30, 41, 59);
            doc.setFontSize(9);
            doc.setFont("helvetica", "normal");
            doc.text(pin.data.phone || 'No phone', col2X, col2Y + 8.5);
            col2Y += 16;

            // Get Direction (Google Maps Link)
            doc.setTextColor(37, 99, 235);
            doc.setFontSize(9);
            doc.setFont("helvetica", "normal");
            const mapUrl = `https://www.google.com/maps?q=${pin.lat},${pin.lng}`;
            doc.link(col2X, col2Y - 3, 30, 4, { url: mapUrl });
            doc.text('Get Direction', col2X, col2Y);

            // ===== COLUMN 3: Phase, Status =====
            
            // Phase
            doc.setTextColor(71, 85, 105);
            doc.setFontSize(8);
            doc.setFont("helvetica", "bold");
            doc.text('PHASE', col3X, col3Y + 4);
            
            doc.setTextColor(30, 41, 59);
            doc.setFontSize(9);
            doc.setFont("helvetica", "normal");
            doc.text(pin.phase, col3X, col3Y + 8.5);
            col3Y += 14;

            // Status
            doc.setTextColor(71, 85, 105);
            doc.setFontSize(8);
            doc.setFont("helvetica", "bold");
            doc.text('STATUS', col3X, col3Y);
            
            const statusColor = pin.status === 'Closed' ? {r: 156, g: 163, b: 175} : {r: 22, g: 163, b: 74};
            doc.setTextColor(statusColor.r, statusColor.g, statusColor.b);
            doc.setFontSize(9);
            doc.setFont("helvetica", "bold");
            doc.text(pin.status, col3X, col3Y + 4.5);

            // Calculate the maximum Y position from all columns
            const maxColumnY = Math.max(col1Y, col2Y, col3Y);
            
            // ===== FOOTER SECTION: Image Thumbnails =====
            
            yPos = maxColumnY + 3;

            if (hasImages) {
                // Separator line before images
                doc.setDrawColor(241, 245, 249);
                doc.setLineWidth(0.2);
                doc.line(margin + 8, yPos, pageWidth - margin - 8, yPos);
                yPos += 3;

                const imgSize = 22;
                const imgSpacing = 2;
                let imgX = margin + 10;
                const maxImagesPerLead = 8;

                for (let imgIdx = 0; imgIdx < Math.min(pin.images.length, maxImagesPerLead); imgIdx++) {
                    // New row after 8 images
                    if (imgIdx > 0 && imgIdx % 8 === 0) {
                        yPos += imgSize + imgSpacing;
                        imgX = margin + 10;
                    }

                    try {
                        // Get image dimensions to maintain aspect ratio
                        const img = new Image();
                        img.src = pin.images[imgIdx];
                        
                        // Calculate scaled dimensions
                        let imgWidth = imgSize;
                        let imgHeight = imgSize;
                        
                        if (img.width > img.height) {
                            imgHeight = (img.height / img.width) * imgSize;
                        } else if (img.height > img.width) {
                            imgWidth = (img.width / img.height) * imgSize;
                        }
                        
                        // Center the image in the square
                        const offsetX = (imgSize - imgWidth) / 2;
                        const offsetY = (imgSize - imgHeight) / 2;
                        
                        doc.addImage(pin.images[imgIdx], 'JPEG', imgX + offsetX, yPos + offsetY, imgWidth, imgHeight);
                        
                        // Border around the square
                        doc.setDrawColor(226, 232, 240);
                        doc.setLineWidth(0.2);
                        doc.rect(imgX, yPos, imgSize, imgSize);
                    } catch (err) {
                        console.error('Failed to add image:', err);
                    }

                    imgX += imgSize + imgSpacing;
                }

                yPos += imgSize + 4;
            }

            // Separator line between leads
            if (i < pins.length - 1) {
                doc.setDrawColor(226, 232, 240);
                doc.setLineWidth(0.3);
                doc.line(margin, yPos, pageWidth - margin, yPos);
                yPos += 3;
            } else {
                yPos += 2;
            }
        }

        // Footer
        const totalPages = doc.internal.pages.length - 1;
        for (let i = 1; i <= totalPages; i++) {
            doc.setPage(i);
            doc.setFontSize(7);
            doc.setTextColor(148, 163, 184);
            doc.text(`Page ${i} of ${totalPages}`, pageWidth / 2, pageHeight - 8, { align: 'center' });
            doc.text('Studiø Field Prospecting', margin, pageHeight - 8);
        }

        doc.save(`Field_Session_${new Date().toISOString().split('T')[0]}.pdf`);

        btn.innerHTML = '<i data-lucide="check" class="w-4 h-4"></i>';
        btn.classList.add('bg-green-500');
        btn.classList.remove('bg-red-600');
        setTimeout(() => {
            btn.innerHTML = '<i data-lucide="file-text" class="w-4 h-4"></i>';
            btn.classList.remove('bg-green-500');
            btn.classList.add('bg-red-600');
            btn.disabled = false;
            lucide.createIcons();
        }, 2000);

    } catch (error) {
        console.error('PDF export failed:', error);
        btn.innerHTML = '<i data-lucide="x" class="w-4 h-4"></i>';
        setTimeout(() => {
            btn.innerHTML = '<i data-lucide="file-text" class="w-4 h-4"></i>';
            btn.disabled = false;
            lucide.createIcons();
        }, 2000);
    }
}

function hexToRgb(hex) {
    const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return result ? {
        r: parseInt(result[1], 16),
        g: parseInt(result[2], 16),
        b: parseInt(result[3], 16)
    } : { r: 15, g: 23, b: 42 };
}

                    imgDiv.className = 'relative group';
                    imgDiv.innerHTML = `
                        <img src="${img}" class="w-full h-32 object-cover rounded-xl border border-gray-200 cursor-pointer" onclick="openLightbox(${pins.indexOf(pin)}, ${idx})">
                        <button onclick="downloadSingleImage(${pinId}, ${idx})" class="absolute top-2 right-2 bg-black/70 text-white p-2 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity" title="Download this image">
                            <i data-lucide="download" class="w-3 h-3"></i>
                        </button>
                        <div class="absolute bottom-2 left-2 bg-black/70 text-white px-2 py-1 rounded text-[9px] font-bold">Photo ${idx + 1}</div>
                    `;
                    imagesContainer.appendChild(imgDiv);
                });
            } else {
                imagesContainer.innerHTML = '<p class="col-span-2 text-sm text-gray-400 italic">No photos</p>';
            }
            
            document.getElementById('leadDetailsModal').style.display = 'flex';
            lucide.createIcons();
        }

        function closeLeadDetails() {
            document.getElementById('leadDetailsModal').style.display = 'none';
            currentLeadDetailId = null;
        }

        function editCurrentLead() {
            if (!currentLeadDetailId) return;
            const leadId = currentLeadDetailId;
            closeLeadDetails();
            openForm(leadId);
        }

        async function downloadSingleImage(pinId, imageIndex) {
            const pin = pins.find(p => p.id === pinId);
            if (!pin || !pin.images[imageIndex]) return;
            
            await createImageWithMetadata(pin.images[imageIndex], pin, imageIndex);
        }

        async function exportLeadAsText() {
            const pin = pins.find(p => p.id === currentLeadDetailId);
            if (!pin) return;
            
            const address = await getAddressFromCoords(pin.lat, pin.lng);
            
            let text = `LEAD #${pin.index}\n`;
            text += `${'='.repeat(50)}\n\n`;
            text += `Contact Name: ${pin.data.name || 'Anonymous'}\n`;
            text += `Phone: ${pin.data.phone || 'Not provided'}\n`;
            text += `Role: ${pin.role}\n`;
            text += `Phase: ${pin.phase}\n`;
            text += `Priority: ${pin.priority}\n`;
            text += `Status: ${pin.status}\n\n`;
            text += `Location:\n${address}\n`;
            text += `Coordinates: ${pin.lat.toFixed(6)}, ${pin.lng.toFixed(6)}\n`;
            text += `Google Maps: https://www.google.com/maps?q=${pin.lat},${pin.lng}\n\n`;
            if (pin.data.notes) {
                text += `Notes:\n${pin.data.notes}\n\n`;
            }
            text += `Photos: ${pin.images.length} attached\n`;
            
            navigator.clipboard.writeText(text);
            showToast('Lead details copied as plain text!');
        }

        async function exportLeadAsMarkdown() {
            const pin = pins.find(p => p.id === currentLeadDetailId);
            if (!pin) return;
            
            const address = await getAddressFromCoords(pin.lat, pin.lng);
            
            let md = `### Lead #${pin.index} - ${pin.data.name || 'Anonymous'}\n\n`;
            md += `#### Contact Information\n\n`;
            md += `- **Name:** ${pin.data.name || 'Anonymous'}\n`;
            md += `- **Phone:** ${pin.data.phone || 'Not provided'}\n`;
            md += `- **Role:** ${pin.role}\n`;
            md += `- **Phase:** ${pin.phase}\n\n`;
            md += `#### Lead Details\n\n`;
            md += `- **Priority:** ${pin.priority}\n`;
            md += `- **Status:** ${pin.status}\n\n`;
            md += `#### Location\n\n`;
            md += `**Address:** ${address}\n\n`;
            md += `**Coordinates:** ${pin.lat.toFixed(6)}, ${pin.lng.toFixed(6)}\n\n`;
            md += `[📍 Open in Google Maps](https://www.google.com/maps?q=${pin.lat},${pin.lng})\n\n`;
            if (pin.data.notes) {
                md += `#### Notes\n\n${pin.data.notes}\n\n`;
            }
            md += `#### Photos\n\n`;
            md += `${pin.images.length} photo${pin.images.length !== 1 ? 's' : ''} attached\n`;
            
            navigator.clipboard.writeText(md);
            showToast('Lead details copied as Markdown!');
        }

        async function getAddressFromCoords(lat, lng) {
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`);
                const data = await response.json();
                
                // Extract meaningful address parts
                const addr = data.address;
                const road = addr.road || addr.street || '';
                const neighborhood = addr.neighbourhood || addr.suburb || addr.district || '';
                const city = addr.city || addr.town || addr.village || 'Riyadh';
                
                // Build readable address
                let parts = [];
                if (road) parts.push(road);
                if (neighborhood) parts.push(neighborhood);
                if (city) parts.push(city);
                
                return parts.join(', ') || `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
            } catch (error) {
                return `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
            }
        }

        function sanitizeFilename(str) {
            return str.replace(/[<>:"/\\|?*]/g, '_').replace(/\s+/g, '_').substring(0, 100);
        }

        async function createImageWithMetadata(imageDataUrl, pin, imageIndex) {
            try {
                // Get address for this pin
                const address = await getAddressFromCoords(pin.lat, pin.lng);
                
                // Create readable filename
                const leadNum = pin.index;
                const location = sanitizeFilename(address);
                const name = sanitizeFilename(pin.data.name || 'Anonymous');
                const phone = sanitizeFilename(pin.data.phone || 'NoPhone');
                const role = sanitizeFilename(pin.role);
                const priority = sanitizeFilename(pin.priority);
                
                // Add image number if multiple images
                const imageNum = pin.images.length > 1 ? `_Img${imageIndex + 1}` : '';
                const filename = `#${leadNum}_${location}_${name}_${phone}_${role}_${priority}${imageNum}.png`;
                
                // Create metadata object
                const metadata = {
                    filename: filename,
                    leadNumber: pin.index,
                    leadId: pin.id,
                    coordinates: { lat: pin.lat, lng: pin.lng },
                    address: address,
                    googleMapsLink: `https://www.google.com/maps?q=${pin.lat},${pin.lng}`,
                    contactName: pin.data.name || '',
                    contactPhone: pin.data.phone || '',
                    role: pin.role,
                    phase: pin.phase,
                    priority: pin.priority,
                    status: pin.status,
                    notes: pin.data.notes || '',
                    imageIndex: imageIndex + 1,
                    totalImages: pin.images.length,
                    sessionDate: new Date().toISOString(),
                    exportedAt: new Date().toISOString()
                };
                
                // Convert base64 to blob
                const response = await fetch(imageDataUrl);
                const blob = await response.blob();
                
                // Create download link
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = filename;
                
                // Add metadata as a comment in the download (browsers will preserve this)
                link.setAttribute('data-metadata', JSON.stringify(metadata));
                
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                
                return { filename, metadata };
            } catch (error) {
                console.error('Error creating image with metadata:', error);
                // Fallback to simple download
                const link = document.createElement('a');
                link.href = imageDataUrl;
                link.download = `Lead-${pin.index}-Photo-${imageIndex + 1}.png`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                return null;
            }
        }

        async function downloadAllImages() {
            if (pins.length === 0) return;
            
            const downloadBtn = document.getElementById('downloadImagesBtn');
            const originalIcon = downloadBtn.innerHTML;
            downloadBtn.innerHTML = '<i data-lucide="loader" class="w-4 h-4 animate-spin"></i>';
            downloadBtn.disabled = true;
            
            try {
                let downloadedCount = 0;
                const totalImages = pins.reduce((sum, pin) => sum + pin.images.length, 0);
                const allMetadata = [];
                
                for (const pin of pins) {
                    if (pin.images.length > 0) {
                        for (let imgIdx = 0; imgIdx < pin.images.length; imgIdx++) {
                            const img = pin.images[imgIdx];
                            const result = await createImageWithMetadata(img, pin, imgIdx);
                            if (result) {
                                allMetadata.push(result);
                            }
                            downloadedCount++;
                            
                            // Small delay to prevent browser blocking
                            await new Promise(resolve => setTimeout(resolve, 50));
                        }
                    }
                }
                
                // Create and download metadata file
                if (allMetadata.length > 0) {
                    const metadataContent = {
                        sessionSummary: {
                            totalLeads: pins.length,
                            totalImages: totalImages,
                            exportDate: new Date().toISOString(),
                            sessionDistance: `${totalDistance.toFixed(2)} km`
                        },
                        imageMetadata: allMetadata
                    };
                    
                    const metadataBlob = new Blob([JSON.stringify(metadataContent, null, 2)], { type: 'application/json' });
                    const metadataUrl = URL.createObjectURL(metadataBlob);
                    const metadataLink = document.createElement('a');
                    metadataLink.href = metadataUrl;
                    metadataLink.download = `Session_Metadata_${new Date().toISOString().split('T')[0]}.json`;
                    document.body.appendChild(metadataLink);
                    metadataLink.click();
                    document.body.removeChild(metadataLink);
                    URL.revokeObjectURL(metadataUrl);
                }
                
                // Show completion
                downloadBtn.innerHTML = '<i data-lucide="check" class="w-4 h-4"></i>';
                downloadBtn.classList.add('bg-green-500');
                downloadBtn.classList.remove('bg-green-600');
                
                setTimeout(() => {
                    downloadBtn.innerHTML = originalIcon;
                    downloadBtn.classList.remove('bg-green-500');
                    downloadBtn.classList.add('bg-green-600');
                    downloadBtn.disabled = false;
                    lucide.createIcons();
                }, 2000);
                
            } catch (error) {
                console.error('Download failed:', error);
                downloadBtn.innerHTML = '<i data-lucide="x" class="w-4 h-4"></i>';
                downloadBtn.classList.add('bg-red-500');
                downloadBtn.classList.remove('bg-green-600');
                
                setTimeout(() => {
                    downloadBtn.innerHTML = originalIcon;
                    downloadBtn.classList.remove('bg-red-500');
                    downloadBtn.classList.add('bg-green-600');
                    downloadBtn.disabled = false;
                    lucide.createIcons();
                }, 2000);
            }
        }
        function requestLocation() { if (!navigator.geolocation) return; navigator.geolocation.getCurrentPosition(pos => { userLocation = [pos.coords.latitude, pos.coords.longitude]; updateMarker(userLocation); map.setView(userLocation); }, null, { enableHighAccuracy: true }); }
        function updateStats() { document.getElementById('sessionStats').innerText = `${isRecording ? 'Recording' : 'Standby'} • ${pins.length} Leads • ${totalDistance.toFixed(1)}km`; }
    </script>
