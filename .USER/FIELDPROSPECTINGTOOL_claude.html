<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studiø Field Prospecting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;500;600&display=swap');
        
        body { font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; background: #fff; }
        h1, h2, .serif { font-family: 'Playfair Display', serif; }

        #map { height: 100vh; width: 100vw; z-index: 1; background: #f8f8f8; cursor: crosshair; }

        .fab {
            position: fixed; bottom: 30px; left: 24px; width: 64px; height: 64px;
            background: black; color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 100;
        }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
            z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px;
        }

        .modal-content {
            background: white; width: 100%; max-width: 450px;
            max-height: 85vh; border-radius: 24px; overflow-y: auto;
            position: relative; box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }

        #exportModal .modal-content { max-width: 950px; }

        .pin-container { transition: all 0.2s ease; cursor: pointer; }
        .pin-container:hover { z-index: 50; transform: scale(1.1); }

        .tooltip {
            display: none; position: absolute; bottom: 120%; left: 50%;
            transform: translateX(-50%); width: 180px; background: #0f172a;
            color: white; padding: 12px; border-radius: 8px; font-size: 11px;
            z-index: 60; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .pin-container:hover .tooltip { display: block; }

        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .status-closed { opacity: 0.5; filter: grayscale(0.2); }
        .leaflet-control-zoom { display: none !important; }
        .leaflet-routing-container { display: none !important; }

        .export-table { width: 100%; border-collapse: collapse; font-size: 11px; text-align: left; }
        .export-table th { padding: 12px 8px; border-bottom: 2px solid #f1f5f9; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 800; }
        .export-table td { padding: 12px 8px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }

        .image-cell { position: relative; width: 60px; }
        .thumb-preview { 
            width: 40px; height: 40px; border-radius: 8px; object-fit: cover; 
            border: 1px solid #e2e8f0; cursor: zoom-in; transition: transform 0.2s;
        }
        .image-cell:hover .hover-zoom { 
            display: block; position: absolute; bottom: 100%; left: 0; 
            z-index: 100; width: 150px; height: 150px; border-radius: 12px;
            object-fit: cover; border: 4px solid white; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .hover-zoom { display: none; pointer-events: none; }

        #lightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <button class="fab" id="addPinBtn">
        <i data-lucide="map-pin"></i>
    </button>

    <div class="fixed top-6 left-6 right-6 z-[100] flex justify-between items-start pointer-events-none">
        <div class="bg-white p-5 rounded-2xl shadow-2xl pointer-events-auto border border-gray-100 flex items-center gap-4">
            <div>
                <h1 class="text-xl font-bold italic leading-tight">Studiø Field</h1>
                <div id="sessionStats" class="text-[10px] text-gray-400 uppercase tracking-tighter mt-0.5">
                    Standby • 0 Leads • 0.0km
                </div>
            </div>
            <div class="h-8 w-[1px] bg-gray-100"></div>
            <button id="toggleSessionBtn" class="flex items-center gap-2 px-4 py-2 rounded-full bg-black text-white text-xs font-bold transition-all active:scale-95">
                <i id="sessionIcon" data-lucide="play" class="w-3 h-3 fill-current"></i>
                <span id="sessionText">START SESSION</span>
            </button>
        </div>

        <div class="flex flex-col gap-2">
            <button id="simToggleBtn" class="bg-white px-4 py-3 rounded-2xl shadow-xl pointer-events-auto border border-gray-100 text-[10px] font-black tracking-tighter flex items-center gap-2 transition-colors">
                <div id="simIndicator" class="w-2 h-2 rounded-full bg-gray-300"></div>
                SIM MODE
            </button>
            <button id="exportBtn" class="bg-white p-4 rounded-2xl shadow-xl pointer-events-auto border border-gray-100 hover:bg-gray-50 transition-colors">
                <i data-lucide="table" class="w-5 h-5 text-gray-600"></i>
            </button>
            <button id="centerBtn" class="bg-white p-4 rounded-2xl shadow-xl pointer-events-auto border border-gray-100 hover:bg-gray-50 active:bg-gray-200">
                <i data-lucide="navigation" class="w-5 h-5 text-gray-600"></i>
            </button>
        </div>
    </div>

    <div id="formModal" class="modal-overlay">
        <div class="modal-content overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-6 bg-gray-50 border-b flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div id="modal-preview-pin"></div>
                    <div>
                        <h3 id="modal-title" class="text-lg font-bold text-gray-900">Specify Lead Pin</h3>
                        <p id="modal-subtitle" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">New Entry</p>
                    </div>
                </div>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600"><i data-lucide="x"></i></button>
            </div>
            <div class="p-6 space-y-5 overflow-y-auto flex-1 custom-scroll">
                <input type="hidden" id="currentPinId">
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest">Urgency</label>
                    <div class="grid grid-cols-4 gap-2" id="priority-options"></div>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest">Status</label>
                    <div class="flex gap-2" id="status-options"></div>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest">Site Photos</label>
                    <div class="flex flex-wrap gap-2" id="image-preview-container">
                        <label class="w-16 h-16 border-2 border-dashed border-gray-200 rounded-xl flex items-center justify-center cursor-pointer hover:border-black transition-colors">
                            <i data-lucide="plus" class="w-4 h-4 text-gray-400"></i>
                            <input type="file" id="imageInput" multiple accept="image/*" class="hidden" onchange="handleImageUpload(event)">
                        </label>
                    </div>
                </div>
                <div class="p-4 bg-gray-50 rounded-2xl space-y-4 border border-gray-100">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-gray-400 uppercase">Role</label>
                            <select id="contactRole" onchange="updatePreview()" class="w-full p-2 bg-white border border-gray-200 rounded-lg text-sm font-bold outline-none"></select>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-gray-400 uppercase">Phase</label>
                            <select id="projectPhase" onchange="updatePreview()" class="w-full p-2 bg-white border border-gray-200 rounded-lg text-sm font-bold outline-none"></select>
                        </div>
                    </div>
                    <input type="text" id="contactName" placeholder="Name..." class="w-full p-2.5 bg-white border border-gray-200 rounded-lg text-sm outline-none">
                    <input type="text" id="contactPhone" placeholder="05XXXXXXXX" class="w-full p-2.5 bg-white border border-gray-200 rounded-lg text-sm outline-none">
                </div>
                <textarea id="siteNotes" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none h-24 resize-none" placeholder="Notes..."></textarea>
            </div>
            <div class="p-4 bg-gray-50 border-t flex items-center gap-3">
                <button id="btn-delete" onclick="deletePin()" class="hidden p-3 bg-red-50 text-red-500 rounded-xl"><i data-lucide="trash-2"></i></button>
                <button onclick="closeModal()" class="flex-1 py-3 text-xs font-black uppercase text-gray-400">Cancel</button>
                <button onclick="saveLead(event)" class="flex-[2] py-4 bg-gray-900 text-white rounded-xl text-xs font-black uppercase shadow-xl">Update</button>
            </div>
        </div>
    </div>

    <div id="exportModal" class="modal-overlay">
        <div class="modal-content flex flex-col">
            <div class="p-8 border-b bg-gray-50 flex justify-between items-center">
                <div>
                    <h2 class="text-3xl font-bold italic leading-none">Session Summary</h2>
                    <p id="exportSubtitle" class="text-[10px] font-black uppercase text-gray-400 tracking-widest mt-2">Loading...</p>
                </div>
                <button onclick="document.getElementById('exportModal').style.display='none'" class="p-2 hover:bg-gray-200 rounded-full transition-colors"><i data-lucide="x"></i></button>
            </div>
            <div class="flex-1 overflow-x-auto p-6 custom-scroll">
                <table class="export-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Photos</th>
                            <th>Contact</th>
                            <th>Role</th>
                            <th>Phase</th>
                            <th>Status</th>
                            <th>Priority</th>
                            <th>Notes</th>
                        </tr>
                    </thead>
                    <tbody id="exportTableBody"></tbody>
                </table>
            </div>
            <div class="p-8 bg-white border-t">
                <button id="copyMarkdownBtn" class="w-full py-5 bg-black text-white rounded-2xl font-bold uppercase text-xs flex items-center justify-center gap-3">
                    <i data-lucide="copy" class="w-4 h-4"></i> Copy Markdown
                </button>
            </div>
        </div>
    </div>

    <div id="lightbox" onclick="closeLightbox()">
        <button class="absolute top-10 right-10 text-white"><i data-lucide="x" class="w-10 h-10"></i></button>
        <button onclick="event.stopPropagation(); prevImage()" class="absolute left-10 text-white p-4 bg-white/10 rounded-full"><i data-lucide="chevron-left"></i></button>
        <img id="lightboxImg" class="max-w-[85vw] max-h-[80vh] object-contain shadow-2xl rounded-lg">
        <button onclick="event.stopPropagation(); nextImage()" class="absolute right-10 text-white p-4 bg-white/10 rounded-full"><i data-lucide="chevron-right"></i></button>
        <div id="lightboxCounter" class="mt-8 text-white font-black text-xs uppercase tracking-widest"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    
    <script>
        let map, userMarker, pathPolyline, plannedPolyline;
        let isRecording = false, isSimulationMode = false, isMoving = false;
        let pins = [], pathPoints = [], plannedPoints = [], userLocation = [24.7136, 46.6753], totalDistance = 0;
        let navQueue = [], lastQueuedLocation = null;
        let routeSeq = 0, routePending = {}, routeNextFlush = 0;
        let currentFormData = { priority: 'Normal', status: 'Active', role: 'Owner', phase: 'ST', images: [] };
        let lightboxState = { images: [], index: 0 };

        const priorities = [{label:'Critical',color:'#ef4444'}, {label:'High',color:'#f97316'}, {label:'Normal',color:'#3b82f6'}, {label:'Low',color:'#94a3b8'}];
        const roles = [{label:'Owner',icon:'star'}, {label:'Client',icon:'star'}, {label:'Consultant',icon:'square'}, {label:'Contractor',icon:'triangle'}, {label:'Foreman',icon:'circle'}];
        const phases = ['ST', 'INT', 'FD', 'EX', 'CL'];
        const statuses = ['New', 'Active', 'On Hold', 'Closed'];

        window.onload = () => {
            lucide.createIcons();
            initMap();
            initFormOptions();
            document.getElementById('centerBtn').onclick = () => { if (!isSimulationMode) requestLocation(); };
            document.getElementById('toggleSessionBtn').onclick = toggleSession;
            document.getElementById('simToggleBtn').onclick = toggleSimulation;
            document.getElementById('addPinBtn').onclick = dropPinAtUser;
            document.getElementById('exportBtn').onclick = showExport;
            document.getElementById('copyMarkdownBtn').onclick = copyMarkdown;
            
            map.on('click', (e) => {
                if (isSimulationMode) planRoute(e.latlng);
            });
            requestLocation();
        };

        function initMap() {
            map = L.map('map', { zoomControl: false, maxZoom: 22 }).setView(userLocation, 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '© CARTO' }).addTo(map);
            pathPolyline = L.polyline([], { color: '#007AFF', weight: 6, opacity: 0.8 }).addTo(map);
            plannedPolyline = L.polyline([], { color: '#007AFF', weight: 4, opacity: 0.4, dashArray: '10, 10' }).addTo(map);
            updateMarker(userLocation);
        }

        function updateMarker(pos) {
            if (userMarker) userMarker.setLatLng(pos);
            else userMarker = L.circleMarker(pos, { radius: 10, fillColor: "#007AFF", color: "white", weight: 4, fillOpacity: 1 }).addTo(map);
        }

        function toggleSimulation() {
            isSimulationMode = !isSimulationMode;
            navQueue = []; isMoving = false;
            plannedPoints = []; plannedPolyline.setLatLngs([]);
            lastQueuedLocation = null;
            routeSeq = 0; routePending = {}; routeNextFlush = 0;
            const dot = document.getElementById('simIndicator');
            dot.className = isSimulationMode ? 'w-2 h-2 rounded-full bg-green-500' : 'w-2 h-2 rounded-full bg-gray-300';
            if (!isSimulationMode) requestLocation();
        }

        function planRoute(targetLatLng) {
            const start = lastQueuedLocation || L.latLng(userLocation[0], userLocation[1]);
            lastQueuedLocation = targetLatLng;
            const seq = routeSeq++;
            const router = new L.Routing.OSRMv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' });
            router.route([{ latLng: start }, { latLng: targetLatLng }], (err, routes) => {
                if (!err && routes && routes[0]) {
                    routePending[seq] = routes[0].coordinates;
                    flushRoutes();
                }
            });
        }

        function flushRoutes() {
            while (routePending[routeNextFlush] !== undefined) {
                const coords = routePending[routeNextFlush];
                delete routePending[routeNextFlush];
                routeNextFlush++;
                plannedPoints = plannedPoints.concat(coords.map(c => [c.lat, c.lng]));
                plannedPolyline.setLatLngs(plannedPoints);
                navQueue.push(coords);
            }
            processQueue();
        }

        async function processQueue() {
            if (isMoving || navQueue.length === 0) return;
            isMoving = true;
            while (navQueue.length > 0) {
                const segment = navQueue.shift();
                for (let i = 0; i < segment.length; i += 3) {
                    const point = segment[i];
                    const prevLoc = userLocation;
                    userLocation = [point.lat, point.lng];
                    updateMarker(userLocation);
                    if (isRecording) {
                        pathPoints.push(userLocation);
                        pathPolyline.setLatLngs(pathPoints);
                        if (prevLoc) totalDistance += map.distance(prevLoc, userLocation) / 1000;
                        updateStats();
                    }
                    if (plannedPoints.length > 0) {
                        plannedPoints.splice(0, 3);
                        plannedPolyline.setLatLngs(plannedPoints);
                    }
                    await new Promise(r => setTimeout(r, 20));
                }
            }
            plannedPoints = []; plannedPolyline.setLatLngs([]);
            isMoving = false;
        }

        function handleImageUpload(e) {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    currentFormData.images.push(event.target.result);
                    renderFormImages();
                };
                reader.readAsDataURL(file);
            });
        }

        function renderFormImages() {
            const container = document.getElementById('image-preview-container');
            const uploadBtn = container.querySelector('label');
            container.innerHTML = ''; container.appendChild(uploadBtn);
            currentFormData.images.forEach((img, idx) => {
                const div = document.createElement('div');
                div.className = 'relative w-16 h-16';
                div.innerHTML = `<img src="${img}" class="w-full h-full object-cover rounded-xl"><button onclick="removeImage(${idx})" class="absolute -top-1 -right-1 bg-red-500 text-white rounded-full p-1"><i data-lucide="x" class="w-2 h-2"></i></button>`;
                container.appendChild(div);
            });
            lucide.createIcons();
        }

        function removeImage(idx) { currentFormData.images.splice(idx, 1); renderFormImages(); }

        function toggleSession() {
            isRecording = !isRecording;
            const btn = document.getElementById('toggleSessionBtn');
            if (isRecording) {
                pathPoints = [userLocation]; totalDistance = 0;
                pathPolyline.setLatLngs(pathPoints);
                btn.classList.replace('bg-black', 'bg-red-500');
                document.getElementById('sessionText').innerText = "STOP SESSION";
            } else {
                btn.classList.replace('bg-red-500', 'bg-black');
                document.getElementById('sessionText').innerText = "START SESSION";
                showExport();
            }
            updateStats();
        }

        function dropPinAtUser() {
            const pinId = Date.now();
            const newPin = { id: pinId, lat: userLocation[0], lng: userLocation[1], index: pins.length + 1, priority: 'Normal', status: 'Active', role: 'Owner', phase: 'ST', images: [], data: { name: '', phone: '', notes: '' } };
            pins.push(newPin);
            renderPin(newPin); openForm(pinId); updateStats();
        }

        function renderPin(pinObj) {
            const marker = L.marker([pinObj.lat, pinObj.lng], {
                icon: L.divIcon({ className: 'pin-container', html: createPinHTML(pinObj), iconSize: [24, 24], iconAnchor: [12, 12] })
            }).addTo(map);
            marker.on('click', () => openForm(pinObj.id));
            pinObj.marker = marker;
            lucide.createIcons();
        }

        function createPinHTML(pin, withTooltip = true) {
            const prio = priorities.find(p => p.label === pin.priority);
            const role = roles.find(r => r.label === pin.role);
            return `<div class="relative flex items-center justify-center">${withTooltip ? `<div class="tooltip"><p class="font-bold mb-1" style="color:${prio.color}">● ${pin.priority}</p><p class="opacity-80">${pin.role} • ${pin.phase}</p></div>` : ''}<div class="absolute -left-5 bg-white text-gray-900 font-black text-[9px] px-0.5 rounded shadow-sm">#${pin.index}</div><div class="p-1.5 rounded-full shadow-lg flex items-center justify-center ${pin.status === 'Closed' ? 'status-closed' : ''}" style="background-color: ${prio.color}; color: white; border: 2px solid white;"><i data-lucide="${role.icon}" class="w-4 h-4" fill="currentColor"></i></div></div>`;
        }

        function initFormOptions() {
            priorities.forEach(p => { const b = document.createElement('button'); b.className = `priority-btn py-2 rounded-lg text-[10px] font-black opacity-60 text-white`; b.style.backgroundColor = p.color; b.innerText = p.label.toUpperCase(); b.onclick = (e) => { e.preventDefault(); setPriority(p.label); }; b.id = `prio-${p.label}`; document.getElementById('priority-options').appendChild(b); });
            statuses.forEach(s => { const b = document.createElement('button'); b.className = `status-btn flex-1 py-1.5 rounded-lg text-[10px] font-bold border bg-white text-gray-500`; b.innerText = s; b.onclick = (e) => { e.preventDefault(); setStatus(s); }; b.id = `status-${s}`; document.getElementById('status-options').appendChild(b); });
            roles.forEach(r => { const o = document.createElement('option'); o.value = r.label; o.innerText = r.label; document.getElementById('contactRole').appendChild(o); });
            phases.forEach(p => { const o = document.createElement('option'); o.value = p; o.innerText = p; document.getElementById('projectPhase').appendChild(o); });
        }

        function setPriority(label) {
            currentFormData.priority = label;
            document.querySelectorAll('.priority-btn').forEach(btn => btn.classList.toggle('opacity-100', btn.id === `prio-${label}`));
            updatePreview();
        }

        function setStatus(label) {
            currentFormData.status = label;
            document.querySelectorAll('.status-btn').forEach(btn => btn.className = `status-btn flex-1 py-1.5 rounded-lg text-[10px] font-bold border ${btn.id === `status-${label}` ? 'bg-black text-white' : 'bg-white text-gray-500'}`);
            updatePreview();
        }

        function updatePreview() {
            const pinId = document.getElementById('currentPinId').value;
            const pin = pins.find(p => p.id == pinId);
            const data = { role: document.getElementById('contactRole').value, priority: currentFormData.priority, phase: document.getElementById('projectPhase').value, status: currentFormData.status, index: pin ? pin.index : pins.length + 1 };
            document.getElementById('modal-preview-pin').innerHTML = createPinHTML(data, false);
            lucide.createIcons();
        }

        function openForm(id) {
            const pin = pins.find(p => p.id === id);
            document.getElementById('currentPinId').value = id;
            document.getElementById('contactName').value = pin.data.name;
            document.getElementById('contactPhone').value = pin.data.phone;
            document.getElementById('siteNotes').value = pin.data.notes;
            currentFormData.images = [...(pin.images || [])];
            setPriority(pin.priority); setStatus(pin.status);
            document.getElementById('contactRole').value = pin.role;
            document.getElementById('projectPhase').value = pin.phase;
            document.getElementById('btn-delete').classList.toggle('hidden', !pin.data.name);
            renderFormImages(); updatePreview();
            document.getElementById('formModal').style.display = 'flex';
        }

        function saveLead(e) {
            e?.preventDefault();
            const pin = pins.find(p => p.id === parseInt(document.getElementById('currentPinId').value));
            Object.assign(pin, { priority: currentFormData.priority, status: currentFormData.status, role: document.getElementById('contactRole').value, phase: document.getElementById('projectPhase').value, images: [...currentFormData.images], data: { name: document.getElementById('contactName').value, phone: document.getElementById('contactPhone').value, notes: document.getElementById('siteNotes').value } });
            if (pin.marker) map.removeLayer(pin.marker);
            renderPin(pin); closeModal(); updateStats();
        }

        function closeModal() { document.getElementById('formModal').style.display = 'none'; }
        function deletePin() { const id = parseInt(document.getElementById('currentPinId').value); const idx = pins.findIndex(p => p.id === id); if (pins[idx].marker) map.removeLayer(pins[idx].marker); pins.splice(idx, 1); pins.forEach((p, i) => { p.index = i + 1; if (p.marker) { map.removeLayer(p.marker); renderPin(p); } }); closeModal(); updateStats(); }

        function showExport() {
            const tbody = document.getElementById('exportTableBody'); tbody.innerHTML = '';
            pins.forEach((p, idx) => {
                const tr = document.createElement('tr');
                const prio = priorities.find(pr => pr.label === p.priority);
                let imgHtml = p.images?.length > 0 ? `<div class="image-cell" onclick="openLightbox(${idx}, 0)"><img src="${p.images[0]}" class="thumb-preview"><img src="${p.images[0]}" class="hover-zoom">${p.images.length > 1 ? `<div class="absolute -bottom-1 -right-1 bg-black text-white text-[7px] px-1 rounded-full">+${p.images.length - 1}</div>` : ''}</div>` : '-';
                tr.innerHTML = `<td class="font-bold text-gray-400">#${p.index}</td><td>${imgHtml}</td><td><div class="font-bold text-gray-900">${p.data.name || 'Anonymous'}</div><div class="text-[9px] text-gray-400">${p.data.phone || '-'}</div></td><td><span class="bg-gray-100 px-2 py-0.5 rounded text-[9px] font-bold">${p.role}</span></td><td><span class="bg-gray-100 px-2 py-0.5 rounded text-[9px] font-bold">${p.phase}</span></td><td class="font-bold ${p.status === 'Closed' ? 'text-gray-400' : 'text-green-600'}">${p.status}</td><td><span class="w-2 h-2 rounded-full inline-block mr-1" style="background:${prio.color}"></span> ${p.priority}</td><td class="text-gray-500 italic max-w-[200px] truncate">${p.data.notes || '-'}</td>`;
                tbody.appendChild(tr);
            });
            document.getElementById('exportSubtitle').innerText = `${pins.length} Leads • ${totalDistance.toFixed(2)} km`;
            document.getElementById('exportModal').style.display = 'flex';
            lucide.createIcons();
        }

        function openLightbox(pIdx, iIdx) { lightboxState = { images: pins[pIdx].images, index: iIdx }; updateLightbox(); document.getElementById('lightbox').style.display = 'flex'; lucide.createIcons(); }
        function updateLightbox() { document.getElementById('lightboxImg').src = lightboxState.images[lightboxState.index]; document.getElementById('lightboxCounter').innerText = `IMAGE ${lightboxState.index + 1} OF ${lightboxState.images.length}`; }
        function nextImage() { lightboxState.index = (lightboxState.index + 1) % lightboxState.images.length; updateLightbox(); }
        function prevImage() { lightboxState.index = (lightboxState.index - 1 + lightboxState.images.length) % lightboxState.images.length; updateLightbox(); }
        function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }
        function copyMarkdown() { let md = `### Field Session Report\n| # | Lead Name | Role | Phase | Priority | Status | Images | Notes |\n|---|---|---|---|---|---|---|---|\n`; pins.forEach(p => md += `| ${p.index} | ${p.data.name || 'Anon'} | ${p.role} | ${p.phase} | ${p.priority} | ${p.status} | ${p.images.length} | ${p.data.notes || '-'} |\n`); navigator.clipboard.writeText(md); }
        function requestLocation() { if (!navigator.geolocation) return; navigator.geolocation.getCurrentPosition(pos => { userLocation = [pos.coords.latitude, pos.coords.longitude]; updateMarker(userLocation); map.setView(userLocation); }, null, { enableHighAccuracy: true }); }
        function updateStats() { document.getElementById('sessionStats').innerText = `${isRecording ? 'Recording' : 'Standby'} • ${pins.length} Leads • ${totalDistance.toFixed(1)}km`; }
    </script>
</body>
</html>
