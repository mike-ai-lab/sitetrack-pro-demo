<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreetTracker UI Refactor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f0f0;
            margin: 0;
            overflow: hidden;
        }

        /* High-end Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(30px) saturate(190%);
            -webkit-backdrop-filter: blur(30px) saturate(190%);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* Custom Range Slider (Apple Style) */
        #speed-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(0,0,0,0.05);
            border-radius: 10px;
            outline: none;
        }

        #speed-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            background: #000;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.2s ease;
        }

        #speed-slider::-webkit-slider-thumb:active {
            transform: scale(1.2);
        }

        .tab-active { color: white !important; }
        .tab-inactive { color: rgba(0, 0, 0, 0.4); }

        /* Mock Map Background */
        .mock-map {
            position: fixed;
            inset: 0;
            background: linear-gradient(45deg, #e5e7eb 25%, transparent 25%) -10px 0,
                        linear-gradient(-45deg, #e5e7eb 25%, transparent 25%) -10px 0,
                        linear-gradient(45deg, transparent 75%, #e5e7eb 75%),
                        linear-gradient(-45deg, transparent 75%, #e5e7eb 75%);
            background-size: 20px 20px;
            background-color: #f3f4f6;
            z-index: 1;
        }

        /* Panel States */
        .panel-collapsed {
            width: 56px !important;
            height: 56px !important;
            border-radius: 50% !important;
        }

        .panel-expanded {
            width: 340px;
            border-radius: 2.8rem;
        }

        .content-hidden {
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            pointer-events: none;
            transition: opacity 0.3s ease, max-height 0.3s ease;
        }

        .content-visible {
            opacity: 1;
            max-height: 1000px;
            transition: opacity 0.4s ease 0.1s, max-height 0.4s ease;
        }

        .header-collapsed {
            padding: 0 !important;
            border: none !important;
            background: transparent !important;
            justify-content: center !important;
            align-items: center !important;
            height: 56px !important;
        }

        .header-collapsed h1,
        .header-collapsed > div:last-child {
            display: none !important;
        }

        .header-collapsed::before {
            content: '';
            display: block;
            width: 24px;
            height: 24px;
            background-image: url("data:image/svg+xml,%3Csvg width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23000' stroke-width='2.5' stroke-linecap='round' xmlns='http://www.w3.org/2000/svg'%3E%3Cline x1='3' y1='7' x2='21' y2='7'/%3E%3Cline x1='3' y1='12' x2='21' y2='12'/%3E%3Cline x1='3' y1='17' x2='21' y2='17'/%3E%3C/svg%3E");
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* Mobile Responsive */
        @media (max-width: 640px) {
            #control-panel {
                top: 16px !important;
                left: 16px !important;
            }

            .panel-expanded {
                width: calc(100vw - 80px) !important;
                max-width: 340px;
            }

            .panel-collapsed {
                width: 56px !important;
                height: 56px !important;
            }
        }

        /* Touch-friendly tap targets */
        @media (hover: none) and (pointer: coarse) {
            button, .group {
                min-height: 44px;
                min-width: 44px;
            }
        }
    </style>
</head>
<body>

    <div class="mock-map"></div>

    <!-- MAIN PANEL COMPONENT -->
    <div id="control-panel" class="fixed top-8 left-8 z-[2000] pointer-events-auto">
        <div id="main-panel" class="glass flex flex-col rounded-[2.8rem] shadow-[0_30px_90px_-10px_rgba(0,0,0,0.2)] w-[340px] overflow-hidden transition-all duration-700 ease-[cubic-bezier(0.16,1,0.3,1)] panel-expanded">
            
            <!-- Branding Section (Clickable Header) -->
            <div id="panel-header" onclick="togglePanel()" class="flex items-center justify-between px-8 py-6 cursor-pointer select-none active:scale-[0.98] transition-all">
                <h1 class="text-[14px] font-bold tracking-[0.2em] text-black uppercase" style="font-family: 'Playfair Display', serif;">
                    STREET<span class="font-light opacity-30">TRACK</span>
                </h1>
                <div class="flex items-center gap-2 bg-green-500/10 px-3 py-1.5 rounded-full">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    <span class="text-[10px] font-black text-green-700 uppercase tracking-widest">Active</span>
                </div>
            </div>

            <!-- Collapsible Content -->
            <div id="panel-content" class="content-visible">
            
            <!-- Segmented Control (The Tab Pill) -->
            <div class="px-5 pb-5">
                <div class="flex bg-black/[0.04] p-1.5 rounded-[1.6rem] relative h-12 items-center">
                    <button onclick="switchTab('planner')" id="btn-planner" class="flex-1 text-[11px] font-extrabold uppercase tracking-[0.12em] z-10 transition-colors duration-500 tab-active">
                        Plan
                    </button>
                    <button onclick="switchTab('recorder')" id="btn-recorder" class="flex-1 text-[11px] font-extrabold uppercase tracking-[0.12em] z-10 transition-colors duration-500 tab-inactive">
                        Rec
                    </button>
                    <button onclick="switchTab('live')" id="btn-live" class="flex-1 text-[11px] font-extrabold uppercase tracking-[0.12em] z-10 transition-colors duration-500 tab-inactive">
                        Live 🟢
                    </button>
                    <button onclick="switchTab('history')" id="btn-history" class="flex-1 text-[11px] font-extrabold uppercase tracking-[0.12em] z-10 transition-colors duration-500 tab-inactive">
                        History
                    </button>
                    <!-- Physical Pill Indicator -->
                    <div id="pill" class="absolute h-[38px] w-[calc(25%-8px)] bg-black rounded-[1.3rem] transition-all duration-600 ease-[cubic-bezier(0.23,1,0.32,1)] shadow-xl shadow-black/30" style="transform: translateX(0px);"></div>
                </div>
            </div>

            <!-- Dynamic Content Area -->
            <div class="px-8 pb-10">
                <!-- Planner View -->
                <div id="view-planner" class="space-y-8 block transition-opacity duration-500">
                    <div class="space-y-5">
                        <div class="flex justify-between items-end">
                            <p class="text-[10px] font-black text-black/25 uppercase tracking-[0.25em]">Route Detail</p>
                            <span class="text-[9px] font-bold text-blue-600 uppercase">Edit Nodes</span>
                        </div>
                        
                        <div class="relative space-y-6 pl-6 before:content-[''] before:absolute before:left-0 before:top-1 before:bottom-1 before:w-[1px] before:bg-black/10">
                            <!-- Origin -->
                            <div class="group cursor-pointer">
                                <span class="block text-[10px] font-bold text-black/40 uppercase tracking-tight mb-1">Departure</span>
                                <div class="flex items-center gap-2">
                                    <div class="w-1.5 h-1.5 rounded-full bg-blue-500"></div>
                                    <span id="label-origin" class="text-xs font-semibold text-black group-hover:text-blue-600 transition-colors italic truncate">Riyadh Arch. Studio...</span>
                                </div>
                            </div>
                            <!-- Destination -->
                            <div class="group cursor-pointer">
                                <span class="block text-[10px] font-bold text-black/40 uppercase tracking-tight mb-1">Arrival</span>
                                <div class="flex items-center gap-2">
                                    <div class="w-1.5 h-1.5 rounded-full bg-red-500"></div>
                                    <span id="label-destination" class="text-xs font-semibold text-black group-hover:text-red-600 transition-colors italic">Set target on map...</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Playback Controls -->
                    <div class="pt-2 flex items-center gap-6">
                        <div class="flex-1 space-y-3">
                            <div class="flex justify-between items-center">
                                <span class="text-[10px] font-black text-black/25 uppercase tracking-widest">Playback</span>
                                <span id="speed-val" class="text-[11px] font-bold bg-black/5 px-2 py-0.5 rounded-md">2.5x</span>
                            </div>
                            <input type="range" id="speed-slider" min="1" max="10" step="0.5" value="2.5" oninput="updateSpeed(this.value)">
                        </div>
                        <button class="w-16 h-16 flex items-center justify-center bg-black text-white rounded-full hover:scale-105 active:scale-95 transition-all shadow-2xl shadow-black/40 group">
                            <svg class="group-hover:translate-x-0.5 transition-transform" width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </button>
                    </div>
                </div>

                <!-- Recorder View (Hidden by Default) -->
                <div id="view-recorder" class="space-y-6 hidden animate-in fade-in slide-in-from-bottom-2 duration-500">
                     <div class="py-10 bg-black/[0.02] rounded-[2rem] border border-black/[0.03] text-center">
                        <span class="text-[10px] font-bold text-black/30 uppercase tracking-[0.2em] block mb-2">Tracking Session</span>
                        <h2 class="text-4xl font-light tracking-tighter text-black" style="font-family: 'Playfair Display', serif;">00:42:18</h2>
                        <div class="mt-4 flex justify-center gap-4">
                            <div class="text-center">
                                <p class="text-[9px] font-bold text-black/40 uppercase">KM</p>
                                <p class="text-sm font-semibold">12.4</p>
                            </div>
                            <div class="w-[1px] h-8 bg-black/5"></div>
                            <div class="text-center">
                                <p class="text-[9px] font-bold text-black/40 uppercase">STREETS</p>
                                <p class="text-sm font-semibold">8</p>
                            </div>
                        </div>
                     </div>
                     <button class="w-full py-5 bg-black text-white rounded-[1.5rem] text-[11px] font-bold uppercase tracking-[0.2em] hover:bg-neutral-800 transition-all shadow-xl shadow-black/20">
                        Stop Recording
                     </button>
                </div>

                <!-- Live View (Hidden by Default) -->
                <div id="view-live" class="space-y-6 hidden animate-in fade-in slide-in-from-bottom-2 duration-500">
                     <div class="py-16 text-center">
                        <span class="text-[10px] font-bold text-black/20 uppercase tracking-[0.25em]">Live Tracking Panel</span>
                        <p class="text-xs text-black/40 mt-2">Future features will be added here</p>
                     </div>
                </div>

                <!-- History View (Hidden by Default) -->
                <div id="view-history" class="space-y-6 hidden animate-in fade-in slide-in-from-bottom-2 duration-500">
                     <div class="py-16 text-center">
                        <span class="text-[10px] font-bold text-black/20 uppercase tracking-[0.25em]">Trip History</span>
                        <p class="text-xs text-black/40 mt-2">Saved trips will appear here</p>
                     </div>
                </div>
            </div>
            
            </div>
            <!-- End Collapsible Content -->
        </div>
    </div>

    <script>
        let isPanelExpanded = true;

        function togglePanel() {
            const panel = document.getElementById('main-panel');
            const content = document.getElementById('panel-content');
            const header = document.getElementById('panel-header');
            
            isPanelExpanded = !isPanelExpanded;
            
            if (isPanelExpanded) {
                panel.classList.remove('panel-collapsed');
                panel.classList.add('panel-expanded');
                content.classList.remove('content-hidden');
                content.classList.add('content-visible');
                header.classList.remove('header-collapsed');
            } else {
                panel.classList.remove('panel-expanded');
                panel.classList.add('panel-collapsed');
                content.classList.remove('content-visible');
                content.classList.add('content-hidden');
                header.classList.add('header-collapsed');
            }
        }

        function switchTab(mode) {
            const pill = document.getElementById('pill');
            const vPlanner = document.getElementById('view-planner');
            const vRecorder = document.getElementById('view-recorder');
            const vLive = document.getElementById('view-live');
            const vHistory = document.getElementById('view-history');
            const bPlanner = document.getElementById('btn-planner');
            const bRecorder = document.getElementById('btn-recorder');
            const bLive = document.getElementById('btn-live');
            const bHistory = document.getElementById('btn-history');

            // Hide all views
            vPlanner.classList.add('hidden');
            vRecorder.classList.add('hidden');
            vLive.classList.add('hidden');
            vHistory.classList.add('hidden');

            // Reset all buttons to inactive
            bPlanner.classList.replace('tab-active', 'tab-inactive');
            bRecorder.classList.replace('tab-active', 'tab-inactive');
            bLive.classList.replace('tab-active', 'tab-inactive');
            bHistory.classList.replace('tab-active', 'tab-inactive');

            // Calculate offset based on button width
            const offset = bPlanner.offsetWidth;

            if (mode === 'planner') {
                pill.style.transform = 'translateX(0px)';
                vPlanner.classList.remove('hidden');
                bPlanner.classList.replace('tab-inactive', 'tab-active');
            } else if (mode === 'recorder') {
                pill.style.transform = `translateX(${offset}px)`;
                vRecorder.classList.remove('hidden');
                bRecorder.classList.replace('tab-inactive', 'tab-active');
            } else if (mode === 'live') {
                pill.style.transform = `translateX(${offset * 2}px)`;
                vLive.classList.remove('hidden');
                bLive.classList.replace('tab-inactive', 'tab-active');
            } else if (mode === 'history') {
                pill.style.transform = `translateX(${offset * 3}px)`;
                vHistory.classList.remove('hidden');
                bHistory.classList.replace('tab-inactive', 'tab-active');
            }
        }

        function updateSpeed(val) {
            document.getElementById('speed-val').innerText = val + 'x';
        }
    </script>
</body>
</html>
